<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Editor + AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --bg-glass-dark: rgba(15, 23, 42, 0.95);
            --bg-light: rgba(255, 255, 255, 0.98);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 10px 30px -5px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #0f0f0f;
        }

        .page-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: #0f0f0f;
        }

        .page-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background: url('public/底图.png') top left no-repeat;
            background-size: 1920px 1080px;
            transform-origin: top left;
        }

        .title-input, .body-input {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 17px;
            font-family: inherit;
            color: #1a1a1a;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .title-input {
            top: 25%;
            left: 51.0417%;
            width: 28.125%;
            height: 3.7037%;
        }

        .body-input {
            top: 38.8889%;
            left: 51.0417%;
            width: 28.125%;
            height: 24.537%;
            resize: none;
            line-height: 1.5;
        }

        .ai-warning {
            position: absolute;
            top: calc(38.8889% + 24.537% + 8px);
            left: 51.0417%;
            font-size: 13px;
            color: #eab308;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ai-warning.show {
            opacity: 1;
        }

        .title-input::placeholder, .body-input::placeholder {
            color: #9ca3af;
        }

        .title-input:focus, .body-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15), 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        /* AI Assistant FAB */
        .ai-fab {
            position: fixed;
            bottom: 200px;
            right: 32px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            cursor: grab;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
            transition: box-shadow 0.2s, transform 0.1s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            user-select: none;
        }

        .ai-fab::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(249, 115, 22, 0.5);
            animation: fabPulse 1.8s ease-out infinite;
            pointer-events: none;
        }

        @keyframes fabPulse {
            0% {
                transform: scale(0.96);
                opacity: 0.85;
            }
            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        .ai-fab-tag {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
            pointer-events: none;
            z-index: 1;
        }

        .ai-fab:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .ai-fab:hover {
            box-shadow: 0 14px 36px rgba(249, 115, 22, 0.5);
        }

        /* AI Chat Panel */
        .ai-panel {
            position: fixed;
            bottom: 110px;
            right: 32px;
            width: 420px;
            height: 580px;
            background: var(--bg-light);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.08);
            z-index: 999;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-panel.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .panel-header img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }

        .panel-header-title {
            flex: 1;
        }

        .panel-header-title h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .panel-header-title span {
            font-size: 12px;
            color: rgba(0,0,0,0.5);
        }

        .close-panel {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(0,0,0,0.06);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0,0,0,0.6);
            transition: all 0.2s;
        }

        .close-panel:hover {
            background: rgba(0,0,0,0.1);
            color: #000;
        }

        .system-prompt-area {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08) 0%, rgba(139, 92, 246, 0.08) 100%);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-height: 0;
            opacity: 0;
            padding: 0 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .system-prompt-area.show {
            opacity: 1;
            max-height: 60px;
            padding: 12px 16px;
        }

        .system-prompt {
            font-size: 13px;
            color: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .generate-btn-small {
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .generate-btn-small:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .system-prompt::before {
            content: '🔍';
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 3px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: messageIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--primary-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-label.translation { color: #8b5cf6; }
        .message-label.polish { color: #f59e0b; }
        .message-label.format { color: #10b981; }
        .message-label.generated { color: #3b82f6; }

        .push-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .push-card {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            padding: 16px;
            transition: all 0.2s;
        }

        .push-card:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.12);
        }

        .push-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .push-card-body {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.6);
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .field-label {
            color: #f97316;
            font-weight: 700;
            font-size: 13px;
            margin-right: 4px;
        }

        .apply-btn {
            flex: 1;
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .apply-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .apply-btn:active {
            transform: translateY(0);
        }

        .card-buttons {
            display: flex;
            gap: 8px;
        }

        .add-to-chat-btn {
            flex: 1;
            padding: 10px 16px;
            background: #fff;
            border: 1px solid var(--primary);
            border-radius: 10px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .add-to-chat-btn:hover {
            background: rgba(37, 99, 235, 0.08);
            border-color: var(--primary);
        }

        .refresh-btn {
            align-self: flex-start;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            color: rgba(0, 0, 0, 0.75);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .refresh-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
        }

        .refresh-btn svg {
            width: 16px;
            height: 16px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(0,0,0,0.5);
            font-size: 13px;
            padding: 16px 0;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-input-wrapper {
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            color: #1a1a1a;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            transition: all 0.2s;
        }

        .chat-input::placeholder {
            color: rgba(0,0,0,0.35);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.04);
        }

        .send-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .ai-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            position: relative;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            color: rgba(0, 0, 0, 0.75);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .action-btn:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
            color: #000;
        }

        .action-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        .dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 8px;
            min-width: 200px;
            box-shadow: var(--shadow-lg);
            display: none;
            z-index: 10;
            white-space: nowrap;
        }

        .dropdown.show {
            display: block;
            animation: dropdownIn 0.2s ease;
        }

        @keyframes dropdownIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-item {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.75);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-item:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #000;
        }

        .dropdown-item.selected {
            background: var(--primary);
            color: #fff;
        }

        .dropdown-item .check {
            width: 14px;
            height: 14px;
            opacity: 0;
        }

        .dropdown-item.selected .check {
            opacity: 1;
        }

        .initial-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px;
        }

        .confirm-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
            font-family: inherit;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
        }

        .confirm-btn:active {
            transform: translateY(0);
        }

        .hint-text {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(0,0,0,0.35);
            text-align: center;
            padding: 40px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            background: #fff;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 14px;
            color: #1a1a1a;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
        }

        .toast::before {
            content: '✓';
            width: 24px;
            height: 24px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="page-wrapper" id="pageWrapper">
            <div class="editor-overlay">
                <input type="text" class="title-input" placeholder="Please enter" id="titleInput">
                <textarea class="body-input" placeholder="Text can contain up to 400 characters" id="bodyInput"></textarea>
                <div class="ai-warning" id="aiWarning">⚠️ Parts of this push copy were generated by AI. Please review carefully and confirm.</div>
            </div>
        </div>
    </div>

    <button class="ai-fab" id="aiFab" aria-label="打开AI助手">
        <span class="ai-fab-tag">AI</span>
    </button>

    <div class="ai-panel" id="aiPanel">
        <div class="panel-header">
            <div class="panel-header-title">
                <h3>AI Marketing Assistance</h3>
            </div>
            <button class="close-panel" id="closePanel">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="system-prompt-area" id="systemPromptArea">
            <div class="system-prompt">
                识别到前面有滴滴券节点，AI生成 Push
            </div>
            <button class="generate-btn-small" id="generateBtn">确定</button>
        </div>

        <div class="chat-messages" id="chatMessages">
        </div>

        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="输入 Push 文案..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="ai-actions">
                <div class="action-btn" id="translateBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    智能翻译
                    <div class="dropdown" id="translateDropdown">
                        <div class="dropdown-item selected" data-value="auto">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            自动识别：<span style="font-weight: 700; color: #ffffff; text-decoration: underline;">西班牙语</span>
                        </div>
                        <div class="dropdown-item" data-value="en">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            英语
                        </div>
                        <div class="dropdown-item" data-value="pt">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            葡萄牙语
                        </div>
                        <div class="dropdown-item" data-value="fr">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            法语
                        </div>
                    </div>
                </div>
                <div class="action-btn" id="polishBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    智能润色
                    <div class="dropdown" id="polishDropdown">
                        <div class="dropdown-item selected" data-value="balanced">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            均衡润色
                        </div>
                        <div class="dropdown-item" data-value="rich">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            更丰富
                        </div>
                        <div class="dropdown-item" data-value="concise">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            更简明
                        </div>
                        <div class="dropdown-item" data-value="casual">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            更轻松
                        </div>
                        <div class="dropdown-item" data-value="emoji">
                            <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            加表情
                        </div>
                    </div>
                </div>
                <div class="action-btn" id="formatBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </svg>
                    智能排版
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Push 文案已应用</div>

    <script>
        const aiFab = document.getElementById('aiFab');
        const aiPanel = document.getElementById('aiPanel');
        const closePanel = document.getElementById('closePanel');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const titleInput = document.getElementById('titleInput');
        const bodyInput = document.getElementById('bodyInput');
        const generateBtn = document.getElementById('generateBtn');
        const toast = document.getElementById('toast');
        
        const translateBtn = document.getElementById('translateBtn');
        const translateDropdown = document.getElementById('translateDropdown');
        const polishBtn = document.getElementById('polishBtn');
        const polishDropdown = document.getElementById('polishDropdown');
        const formatBtn = document.getElementById('formatBtn');

        let isPanelOpen = false;
        let currentTranslate = 'auto';
        let currentPolish = 'balanced';
        let variantToggle = -1;
        let hasGenerated = false;

        // Drag functionality
        let isDragging = false;
        let dragStartX, dragStartY, initialX, initialY;
        let hasMoved = false;

        aiFab.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            hasMoved = false;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const rect = aiFab.getBoundingClientRect();
            initialX = rect.left;
            initialY = rect.top;
            aiFab.style.transition = 'none';
        });

        aiFab.addEventListener('dragstart', (e) => {
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                hasMoved = true;
            }
            aiFab.style.left = initialX + dx + 'px';
            aiFab.style.top = initialY + dy + 'px';
            aiFab.style.right = 'auto';
            aiFab.style.bottom = 'auto';
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            aiFab.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
        });

        aiFab.addEventListener('click', (e) => {
            if (hasMoved) return;
            isPanelOpen = !isPanelOpen;
            aiPanel.classList.toggle('active', isPanelOpen);
            
            const systemPromptArea = document.querySelector('.system-prompt-area');
            if (isPanelOpen) {
                setTimeout(() => {
                    systemPromptArea.classList.add('show');
                }, 500);
                hasGenerated = false;
                chatMessages.innerHTML = '';
                variantToggle = -1;
                
                const titleVal = titleInput.value.trim();
                const bodyVal = bodyInput.value.trim();
                if (titleVal || bodyVal) {
                    let content = '';
                    if (titleVal) content += titleVal;
                    if (bodyVal) {
                        if (content) content += '\n';
                        content += bodyVal;
                    }
                    chatInput.value = content;
                    chatInput.style.height = 'auto';
                    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                }
            } else {
                systemPromptArea.classList.remove('show');
            }
        });

        closePanel.addEventListener('click', () => {
            isPanelOpen = false;
            aiPanel.classList.remove('active');
            document.querySelector('.system-prompt-area').classList.remove('show');
            hasGenerated = false; // 重置状态，下次打开时重新显示"识别到"区域
        });

        const pushVariants = [
            {
                title: '🎉 ¡Tu descuento del 55% espera!',
                body: 'No dejes pasar esta oferta exclusiva. Tu cupón de descuento ya está disponible. ¡Acts ahora y ahorra!'
            },
            {
                title: '🔥 55% de descuento disponible',
                body: 'Tienes un cupón de descuento del 55% en tu cuenta. ¡Última oportunidad! Visita la app ahora.'
            },
            {
                title: '💰 ¡Ahorra un 55% hoy!',
                body: 'Tu cupón de descuento del 55% está activo. No te lo pierdas. Haz clic para comenzar a ahorrar.'
            }
        ];

        const refreshVariants = [
            [
                { title: '⏰ ¡Cupón del 55% por tiempo limitado!', body: 'Tu descuento te espera. Date prida y aprovecha esta oferta especial antes de que expire.' },
                { title: '🎁 55% de descuento - Solo hoy', body: 'Tenemos un regalo para ti. Tu cupón del 55% de descuento ya está listo. ¡No lo dejes pasar!' },
                { title: '✨ Tu descuento del 55% está aquí', body: 'Acabas de recibir un cupón exclusivo del 55%. ¡Visítanos y disfruta de grandes ahorros ahora!' }
            ],
            [
                { title: '💎 Oferta especial del 55%', body: 'Tu cupón de descuento está esperando. Haz clic para revelar tu ahorro. ¡No te lo perderás!' },
                { title: '📱 Tu descuento te espera en la app', body: 'Con tu cupón del 55%, tus compras serán más económicas. Abre la app y empieza a ahorrar.' },
                { title: '🎊 55% de descuento - ¡Aprovéchalo!', body: 'Tenemos una sorpresa para ti. Tu cupón del 55% ya está disponible. ¡Visítanos ahora!' }
            ],
            [
                { title: '🏷️ ¡No te pierdas este 55%!', body: 'Tu descuento exclusivo del 55% te espera. ¡Abre la app y descubre tu ahorro ahora mismo!' },
                { title: '⭐ Tu 55% de descuento está activo', body: 'Es hora de ahorrar. Tu cupón del 55% está listo para usar. ¡No esperes más!' },
                { title: '🚀 ¡Ahorra hoy con 55% menos!', body: 'Tu oportunidad de ahorrar un 55% está aquí. Haz clic y disfruta de tu descuento ahora.' }
            ]
        ];

        function generateRandomPush() {
            const titles = [
                '🎉 ¡Tu descuento del 55% espera!',
                '🔥 55% de descuento disponible',
                '💰 ¡Ahorra un 55% hoy!',
                '⏰ ¡Cupón del 55% por tiempo limitado!',
                '🎁 55% de descuento - Solo hoy',
                '✨ Tu descuento del 55% está aquí',
                '💎 Oferta especial del 55%',
                '📱 Tu descuento te espera en la app',
                '🎊 55% de descuento - ¡Aprovéchalo!',
                '🏷️ ¡No te pierdas este 55%!',
                '⭐ Tu 55% de descuento está activo',
                '🚀 ¡Ahorra hoy con 55% menos!'
            ];
            const bodies = [
                'No dejes pasar esta oferta exclusiva. Tu cupón de descuento ya está disponible. ¡Actúa ahora y ahorra!',
                'Tienes un cupón de descuento del 55% en tu cuenta. ¡Última oportunidad! Visita la app ahora.',
                'Tu cupón de descuento del 55% está activo. No te lo pierdas. Haz clic para comenzar a ahorrar.',
                'Tu descuento te espera. Date prisa y aprovecha esta oferta especial antes de que expire.',
                'Tenemos un regalo para ti. Tu cupón del 55% de descuento ya está listo. ¡No lo dejes pasar!',
                'Acabas de recibir un cupón exclusivo del 55%. ¡Visítanos y disfruta de grandes ahorros ahora!',
                'Tu cupón de descuento está esperando. Haz clic para revelar tu ahorro. ¡No te lo perderás!',
                'Con tu cupón del 55%, tus compras serán más económicas. Abre la app y empieza a ahorrar.',
                'Tenemos una sorpresa para ti. Tu cupón del 55% ya está disponible. ¡Visítanos ahora!'
            ];
            
            const shuffled = bodies.sort(() => 0.5 - Math.random());
            return [
                { title: titles[Math.floor(Math.random() * titles.length)], body: shuffled[0] },
                { title: titles[Math.floor(Math.random() * titles.length)], body: shuffled[1] },
                { title: titles[Math.floor(Math.random() * titles.length)], body: shuffled[2] }
            ];
        }

        let variantIndex = 0;

        let currentPushData = [];

        function createPushCards(pushData, label = 'AI生成', labelClass = 'generated', showRefresh = false) {
            currentPushData = pushData;
            return `
                <div class="message">
                    <div class="message-label ${labelClass}">${label}</div>
                    <div class="push-cards">
                        ${pushData.map((item, idx) => `
                            <div class="push-card">
                                <div class="push-card-title"><span class="field-label">Title:</span> ${item.title}</div>
                                <div class="push-card-body"><span class="field-label">Body:</span> ${item.body}</div>
                                <div class="card-buttons">
                                    <button class="apply-btn" onclick="applyPush('${item.title.replace(/'/g, "\\'")}', '${item.body.replace(/'/g, "\\'")}')">Apply this Copy</button>
                                    <button class="add-to-chat-btn" data-idx="${idx}">Add to the Chatbox</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${showRefresh ? `
                    <button class="refresh-btn js-refresh-btn" style="margin-top: 12px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        换一换
                    </button>
                    ` : ''}
                </div>
            `;
        }

        function appendUserMessage(label, text) {
            chatMessages.insertAdjacentHTML('beforeend', `
                <div class="message" style="align-items: flex-end;">
                    <div class="message-label" style="color: #666;">${label}</div>
                    <div class="push-card" style="background: rgba(37, 99, 235, 0.1); border-color: rgba(37, 99, 235, 0.2); max-width: 90%;">
                        <div style="font-size: 13px; color: #1a1a1a; white-space: pre-wrap;">${text}</div>
                    </div>
                </div>
            `);
        }

        function appendLoading() {
            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = '<div class="loading-spinner"></div>AI is thinking...';
            chatMessages.appendChild(loading);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return loading;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        function processFreePrompt(inputText) {
            if (!inputText) return;

            appendUserMessage('用户输入', inputText);
            const loading = appendLoading();

            setTimeout(() => {
                loading.remove();

                const lines = inputText.split('\n').filter(l => l.trim());
                const result = {
                    title: lines[0] || '🎉 ¡Tu cupón del 55% te espera!',
                    body: lines.slice(1).join('\n') || 'Tu descuento del 55% está disponible en tu cuenta. ¡Abre la app y úsalo ahora!'
                };

                chatMessages.insertAdjacentHTML('beforeend', createPushCards([result], 'AI生成', 'generated', false));
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 900);
        }

        function applyPush(title, body) {
            title = title.replace(/^title:\s*/i, '').replace(/^title：\s*/i, '');
            body = body.replace(/^body:\s*/i, '').replace(/^body：\s*/i, '');
            
            titleInput.value = title;
            bodyInput.value = body;
            
            const aiWarning = document.getElementById('aiWarning');
            aiWarning.classList.add('show');
            
            isPanelOpen = false;
            aiPanel.classList.remove('active');
            
            showToast('Push 文案已应用');
        }

        function addToChatbox(title, body) {
            let content = '';
            if (title) content += title;
            if (body) {
                if (content) content += '\n';
                content += body;
            }
            chatInput.value = content;
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
            chatInput.focus();
        }

        function appendGeneratedCards(pushData) {
            chatMessages.insertAdjacentHTML('beforeend', createPushCards(pushData, 'AI生成', 'generated', true));
            hasGenerated = true;
        }

        function generateInitialCardsIfNeeded() {
            if (hasGenerated) return;
            const loading = appendLoading();
            setTimeout(() => {
                loading.remove();
                appendGeneratedCards(pushVariants);
            }, 900);
        }

        generateBtn.addEventListener('click', () => {
            if (hasGenerated) return;
            
            // 隐藏"识别到"区域（使用class实现平滑动画）
            const systemPromptArea = document.getElementById('systemPromptArea');
            if (systemPromptArea) {
                systemPromptArea.classList.remove('show');
            }
            
            const loading = appendLoading();
            setTimeout(() => {
                loading.remove();
                appendGeneratedCards(pushVariants);
                hasGenerated = true;
            }, 1500);
        });
        
        document.addEventListener('click', function(e) {
            if (!hasGenerated) return;

            const refreshBtn = e.target && e.target.closest('.js-refresh-btn');
            if (refreshBtn) {
                const loading = appendLoading();

                setTimeout(() => {
                    loading.remove();
                    variantToggle = (variantToggle + 1) % refreshVariants.length;
                    chatMessages.insertAdjacentHTML('beforeend', createPushCards(refreshVariants[variantToggle], 'AI生成', 'generated', true));
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 1000);
            }
        });

        translateBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            translateDropdown.classList.toggle('show');
            polishDropdown.classList.remove('show');
        });

        polishBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            polishDropdown.classList.toggle('show');
            translateDropdown.classList.remove('show');
        });

        document.querySelectorAll('#translateDropdown .dropdown-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('#translateDropdown .dropdown-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentTranslate = item.dataset.value;
                translateDropdown.classList.remove('show');
                
                let inputText = chatInput.value.trim();
                if (!inputText) {
                    showToast('请先输入要处理的内容');
                    return;
                }
                processWithAI('translate', currentTranslate, inputText);
            });
        });

        document.querySelectorAll('#polishDropdown .dropdown-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('#polishDropdown .dropdown-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentPolish = item.dataset.value;
                polishDropdown.classList.remove('show');
                
                let inputText = chatInput.value.trim();
                if (!inputText) {
                    showToast('请先输入要处理的内容');
                    return;
                }
                processWithAI('polish', currentPolish, inputText);
            });
        });

        formatBtn.addEventListener('click', () => {
            translateDropdown.classList.remove('show');
            polishDropdown.classList.remove('show');
            
            let inputText = chatInput.value.trim();
            if (!inputText) {
                showToast('请先输入要处理的内容');
                return;
            }
            processWithAI('format', 'default', inputText);
        });

        function processWithAI(type, value, inputText) {
            if (!inputText) return;

            let funcName = '';
            if (type === 'translate') {
                const langNames = { 'en': '英语', 'pt': '葡萄牙语', 'fr': '法语', 'auto': '西班牙语' };
                funcName = '智能翻译：' + (value === 'auto' ? '自动识别' : langNames[value] || '');
            } else if (type === 'polish') {
                const polishNames = { 'balanced': '均衡润色', 'rich': '更丰富', 'concise': '更简明', 'casual': '更轻松', 'emoji': '加表情' };
                funcName = '智能润色：' + (polishNames[value] || '');
            } else if (type === 'format') {
                funcName = '智能排版';
            }

            appendUserMessage(funcName, inputText);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            const loading = appendLoading();

            setTimeout(() => {
                loading.remove();
                
                let result;
                let label, labelClass;
                
                if (type === 'translate') {
                    label = '智能翻译 ✨';
                    labelClass = 'translation';
                    const langMap = { 'en': 'EN', 'pt': 'PT', 'fr': 'FR', 'auto': 'ES→自动' };
                    const langNames = { 'en': '英语', 'pt': '葡萄牙语', 'fr': '法语', 'auto': '西班牙语' };
                    result = {
                        title: inputText.split('\n')[0] || inputText,
                        body: inputText.split('\n').slice(1).join('\n') || `(Translated to ${langNames[value]}) ${inputText}`
                    };
                    if (value === 'en') {
                        result = {
                            title: '🎉 Your 55% Discount Awaits!',
                            body: 'Don\'t miss this exclusive offer. Your discount coupon is ready. Act now and save!'
                        };
                    } else if (value === 'pt') {
                        result = {
                            title: '🎉 Seu desconto de 55% espera!',
                            body: 'Não perca esta oferta exclusiva. Seu cupom de desconto já está disponível. Ative agora e economize!'
                        };
                    } else if (value === 'fr') {
                        result = {
                            title: '🎉 Votre remise de 55% vous attend!',
                            body: 'Ne manquez pas cette offre exclusive. Votre coupon de réduction est déjà disponible. Agissez maintenant et économisez!'
                        };
                    } else {
                        result = {
                            title: '🎉 Tu descuento del 55% espera!',
                            body: 'No dejes pasar esta oferta exclusiva. Tu cupón de descuento ya está disponible.'
                        };
                    }
                } else if (type === 'polish') {
                    label = '智能润色 ✨';
                    labelClass = 'polish';
                    const polishEffects = {
                        'rich': '📖 丰富版：',
                        'concise': '✂️ 简明版：',
                        'casual': '😎 轻松版：',
                        'emoji': '😊 加表情：'
                    };
                    if (value === 'rich') {
                        result = {
                            title: '🎁 ¡Excelentes noticias! Tu descuento exclusivo del 55%',
                            body: 'Tenemos algo especial para ti. Tu cupón de descuento del 55% ha sido aplicado a tu cuenta. No dejes pasar esta oportunidad única de ahorrar en grande. ¡Visítanos ahora!'
                        };
                    } else if (value === 'concise') {
                        result = {
                            title: '🎉 55% de descuento disponible',
                            body: 'Tu cupón te espera. ¡Ahorra ahora!'
                        };
                    } else if (value === 'casual') {
                        result = {
                            title: '👋 ¡Ey! Tu 55% de descuento está listo',
                            body: '¡No te lo pienses! Tu cupón te espera. ¡Ve y disfrútalo!'
                        };
                    } else if (value === 'emoji') {
                        result = {
                            title: '🎉✨ Tu descuento del 55% 💰',
                            body: '👉 ¡Tu cupón está esperando! 🚀 No lo pienses más y ahorra hoy mismo! 🎊'
                        };
                    } else {
                        result = {
                            title: inputText,
                            body: inputText
                        };
                    }
                } else if (type === 'format') {
                    label = '智能排版 ✨';
                    labelClass = 'format';
                    const lines = inputText.split('\n').filter(l => l.trim());
                    result = {
                        title: lines[0] || inputText,
                        body: lines.slice(1).join('\n') || inputText
                    };
                    const formattedBody = result.body.split('').map((char, i) => {
                        if (char === ' ' && Math.random() > 0.7) return '  ';
                        return char;
                    }).join('');
                    result.body = formattedBody || '✨ Tu contenido formateado:\n\n' + inputText;
                }

                const messageDiv = document.createElement('div');
                messageDiv.innerHTML = createPushCards([result], label, labelClass, true);
                chatMessages.appendChild(messageDiv);
            }, 1200);
        }

        document.addEventListener('click', (e) => {
            if (!translateBtn.contains(e.target) && !translateDropdown.contains(e.target)) {
                translateDropdown.classList.remove('show');
            }
            if (!polishBtn.contains(e.target) && !polishDropdown.contains(e.target)) {
                polishDropdown.classList.remove('show');
            }
        });

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        chatMessages.addEventListener('click', function(e) {
            const addBtn = e.target.closest('.add-to-chat-btn');
            if (addBtn) {
                const idx = parseInt(addBtn.dataset.idx);
                const item = currentPushData[idx];
                if (item) {
                    addToChatbox(item.title, item.body);
                }
            }
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = this.value.trim();
                if (text) {
                    processFreePrompt(text);
                    this.value = '';
                    this.style.height = 'auto';
                }
            }
        });

        const sendBtn = document.getElementById('sendBtn');
        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if (text) {
                processFreePrompt(text);
                chatInput.value = '';
                chatInput.style.height = 'auto';
            }
        });

        function initScale() {
            const scale = Math.min(window.innerWidth / 1920, 1);
            const wrapper = document.getElementById('pageWrapper');
            if (wrapper) {
                wrapper.style.transform = `scale(${scale})`;
            }
        }
        
        window.addEventListener('load', initScale);
        window.addEventListener('resize', initScale);

        bodyInput.addEventListener('input', function() {
            const aiWarning = document.getElementById('aiWarning');
            aiWarning.classList.remove('show');
        });
    </script>
</body>
</html>
