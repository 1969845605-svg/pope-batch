                const startIdx = evtIdx >= 0 ? evtIdx : 0;
                const candidateNodes = nodes.map((n, i) => ({ node: n, origIdx: i })).filter(({ origIdx }) => origIdx >= startIdx);
                const hasExcelUploadSelection = candidateNodes.some(({ node }) => node.fields.some(f => f.dataType === 'excel_upload' && !f.deleted));
                const nodeCols = [];
                candidateNodes.forEach(({ node }) => {
                    const exportFields = hasExcelUploadSelection
                        ? node.fields.filter(f => f.dataType === 'excel_upload' && !f.deleted && !f.isMaxCoupon && !f.isMaxQuickReply && !f.isMaxCallToAction)
                        : node.fields.filter(f => !f.deleted && !f.isMaxCoupon && !f.isMaxQuickReply && !f.isMaxCallToAction);
                    if (exportFields.length > 0) nodeCols.push({ node, fields: exportFields });
                });
                const totalCols = 1 + (hasEventApproval ? 1 : 0) + nodeCols.reduce((sum, nc) => sum + nc.fields.length, 0);
                const TEMPLATE_MAX_ROWS = 1000;
                const aoa = [];
                for (let r = 0; r < TEMPLATE_MAX_ROWS; r++) aoa.push(new Array(totalCols).fill(''));
                aoa[0][0] = 'POPE Template';
                aoa[1][0] = 'Template name';
                aoa[2][0] = templateNameValue;
                let colIdx = 1;
                if (hasEventApproval) {
                    aoa[0][colIdx] = 'Event Approval';
                    aoa[1][colIdx] = 'Canvas Automatic Approval';
                    aoa[2][colIdx] = 'Yes / No';
                    colIdx++;
                }
                const merges = [];
                const colIndexMap = [];
                nodeCols.forEach(nc => {
                    const startCol = colIdx;
                    const baseName = nc.node.nodeName.replace(/-\d+$/, '');
                    const displayName = getTemplateNodeLabel(nc.node);
                    nc.fields.forEach((f) => {
                        if (f.deleted) return;
                        const fieldName = f.subname ? f.subname : f.name;
                        const indexMatch = fieldName.match(/-(\d+)$/);
                        const index = indexMatch ? parseInt(indexMatch[1]) : 0;
                        aoa[0][colIdx] = displayName;
                        aoa[1][colIdx] = fieldName;
                        aoa[2][colIdx] = getPrompt(baseName, fieldName);
                        colIndexMap.push({ col: colIdx, index });
                        colIdx++;
                    });
                    if (nc.fields.length > 1) merges.push({ s: { r: 0, c: startCol }, e: { r: 0, c: colIdx - 1 } });
                });
                const colWidths = [{ wch: 24 }, { wch: 9 }, { wch: 29 }, { wch: 32 }, { wch: 9 }, { wch: 23 }, { wch: 17 }, { wch: 17 }, { wch: 23 }, { wch: 25 }];
                while (colWidths.length < totalCols) colWidths.push({ wch: 18 });
                const wb = XLSX.utils.book_new();
                const ws = {};
                ws['!cols'] = colWidths;
                ws['!merges'] = merges;
                ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: TEMPLATE_MAX_ROWS - 1, c: totalCols - 1 } });
                for (let r = 0; r < TEMPLATE_MAX_ROWS; r++) {
                    for (let c = 0; c < totalCols; c++) {
                        const cellRef = XLSX.utils.encode_cell({ r, c });
                        const colInfo = colIndexMap.find(info => info.col === c);
                        const isHighlight = colInfo && colInfo.index !== 0 && colInfo.index % 2 === 0;
                        const isTopHeader = r === 0;
                        const isFieldHeader = r === 1;
                        const isPromptRow = r === 2;
                        ws[cellRef] = {
                            t: 's',
                            v: aoa[r][c] || '',
                            s: {
                                font: { name: 'Times New Roman' },
                                alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                                border: { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } }
                            }
                        };
                        if (isTopHeader && c === 0) {
                            ws[cellRef].s.fill = { fgColor: { rgb: '4472C4' } };
                            ws[cellRef].s.font = { bold: true, color: { rgb: 'FFFFFF' }, name: 'Times New Roman' };
                        } else if (isTopHeader && aoa[r][c]) {
                            ws[cellRef].s.fill = { fgColor: { rgb: 'D9E1F2' } };
                            ws[cellRef].s.font = { bold: true, name: 'Times New Roman' };
                        } else if (isFieldHeader || isPromptRow) {
                            ws[cellRef].s.fill = { fgColor: { rgb: 'F2F2F2' } };
                            if (isFieldHeader) ws[cellRef].s.font = { bold: true, name: 'Times New Roman' };
                        }
                        if (isHighlight) ws[cellRef].s.fill = { fgColor: { rgb: 'FFF2CC' } };
                    }
                }
                XLSX.utils.book_append_sheet(wb, ws, 'POPE');
                return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            };

            const importExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    const newNodes = [];
                    let currentNode = null;
                    let currentNodeRawName = '';
                    let nodeId = 1;
                    const usedPositions = new Set();
                    json.forEach(row => {
                        const rawNodeName = (row.node_name || '').trim();
                        if (!rawNodeName) return;
                        const fieldName = row.field_name || '';
                        const position = row.position || '';
                        const baseName = rawNodeName.replace(/-\d+$/, '').trim();
                        const isPinned = baseName === 'Background' || baseName === 'Event basic info';
                        const isTargetGroup = baseName === 'Target Group';
                        const useFollowTemplateKey = ['Push text(APP)', 'Email', 'WhatsAPP Message', 'SMS'].includes(baseName);
                        let gridX = 0, gridY = 0;
                        if (position) {
                            const posMatch = position.match(/\((\d+),(\d+)\)/);
                            if (posMatch) {
                                gridX = parseInt(posMatch[1]);
                                gridY = parseInt(posMatch[2]);
                            }
                        }
                        if (!currentNode || currentNodeRawName !== rawNodeName) {
                            if (currentNode) newNodes.push(currentNode);
                            if (!isPinned && !isTargetGroup && gridX === 0 && gridY === 0) {
                                while (usedPositions.has(`${gridX},${gridY}`)) {
                                    gridX = (gridX + 1) % GRID_COLS;
                                    if (gridX === 0) gridY++;
                                }
                            }
                            usedPositions.add(`${gridX},${gridY}`);
                            currentNodeRawName = rawNodeName;
                            currentNode = { 
                                id: 'imported_' + (nodeId++), 
                                nodeName: baseName, 
                                gridX, 
                                gridY,
                                fields: [], 
                                notes: '',
                                pinned: isPinned || false,
                                isTargetGroup: isTargetGroup || false,
                                useFollowTemplateKey: useFollowTemplateKey || false
                            };
                            if (isPinned) {
                                currentNode.gridX = baseName === 'Background' ? 0 : 1;
                                currentNode.gridY = -2;
                            }
                            if (isTargetGroup) {
                                currentNode.gridX = 0;
                                currentNode.gridY = 0;
                            }
                        }
                        if (fieldName) {
                            const name = fieldName;
                            const subname = '';
                            let dataType = '';
                            let deleted = false;
                            if (row.data_type === 'Excel Upload') dataType = 'excel_upload';
                            else if (row.data_type === 'Follow Template Key') dataType = 'follow_template_key';
                            else if (row.data_type === 'Fixed') dataType = 'fixed_value';
                            else if (row.data_type === 'System-Generated') dataType = 'system_generated';
                            else if (row.data_type === 'No Need') { dataType = ''; deleted = true; }
                            const fieldValue = row.value === 'No Need' ? '' : (row.value || '');
                            currentNode.fields.push({
                                name,
                                subname,
                                example: row.example || '',
                                dataType,
                                value: fieldValue,
                                deleted
                            });
                            if (row.notes) {
                                currentNode.notes = row.notes;
                            }
                        } else if (!fieldName && currentNode.fields.length === 0 && row.notes) {
                            currentNode.notes = row.notes;
                        }
                    });
                    if (currentNode) newNodes.push(currentNode);
                    setNodes(newNodes);
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };
            
            const clearAll = () => {
                if (confirm('Are you sure you want to clear all data?')) {
                    setNodes([
                        { id: 'bg', nodeName: 'Background', gridX: 0, gridY: -2, pinned: true, fields: TEMPLATES['Background'].fields.map(f => ({...f})) },
                        { id: 'evt', nodeName: 'Event basic info', gridX: 1, gridY: -2, pinned: true, fields: TEMPLATES['Event basic info'].fields.map(f => ({...f})) },
                        { id: 'tg', nodeName: 'Target Group', gridX: 0, gridY: 0, fields: TEMPLATES['Target Group'].fields.map(f => ({...f})), isTargetGroup: true }
                    ]);
                    setSelectedId(null);
                }
            };
            
            const pinned = nodes.filter(n => n.pinned);
            const grid = nodes.filter(n => !n.pinned);
            const orderedGridNodes = nodes.filter(n => !n.pinned && !n.isTargetGroup).sort((a, b) => a.gridY - b.gridY || a.gridX - b.gridX);
            const nodeDisplayNameById = new Map(orderedGridNodes.map((n, idx) => [n.id, `${n.nodeName}-${idx + 2}`]));
            const getNodeDisplayName = (node) => {
                if (node.isTargetGroup) return `${node.nodeName}-1`;
                return nodeDisplayNameById.get(node.id) || node.nodeName;
            };
            const selected = nodes.find(n => n.id === selectedId);
            
            return (
                <div className="flex flex-col h-screen">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <h1 className="text-xl font-semibold">POPE Batch Template</h1>
                            <button onClick={downloadPRD} className="px-3 py-1 text-sm border-2 border-orange-500 text-orange-600 rounded hover:bg-orange-50 font-medium">PRD</button>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => {
                                const excelData = generateTemplateExcel();
                                const blob = new Blob([excelData], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = 'Template.xlsx';
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                                URL.revokeObjectURL(url);
                            }} className="px-3 py-1 text-sm border-2 border-purple-500 text-purple-600 rounded hover:bg-purple-50 font-medium">Download Template</button>
                            <button onClick={exportExcel} className="bg-blue-600 text-white px-4 py-2 rounded">Export</button>
                            <label className="bg-green-600 text-white px-4 py-2 rounded cursor-pointer hover:bg-green-700">
                                Upload
                                <input type="file" accept=".xlsx,.xls" onChange={importExcel} className="hidden"/>
                            </label>
                            <button onClick={clearAll} className="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Clear All</button>
                        </div>
                    </header>
                    <div className="flex gap-4 p-4 bg-gray-100 border-b">
                        {pinned.map(n => {
                            const sel = selectedId === n.id;
                            return <div key={n.id} className={`flex-1 bg-gradient-to-br rounded-lg shadow-md cursor-pointer ${sel?'ring-2 ring-blue-500':'hover:shadow-lg'} transition`} style={{minHeight:80, background:n.nodeName==='Background'?'linear-gradient(135deg,#6366f1,#4f46e5)':'linear-gradient(131deg,#8b5cf6,#7c3aed)'}} onClick={() => setSelectedId(n.id)}>
                                <div className="h-full flex flex-col items-center justify-center p-4">
                                    <span className="text-white font-semibold text-lg">{n.nodeName}</span>
                                    <span className="text-white text-sm font-medium">Required</span>
                                </div>
                            </div>;
                        })}
                    </div>
                    <div className="flex flex-1 overflow-hidden">
                        <aside className="w-56 bg-gray-50 border-r p-3 overflow-y-auto">
                            <div className="space-y-4">
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Triggers</h4>
                                    {['User Event', 'Delay of executing task', 'Task Start Time', 'Special bubble for issuing coupons after call'].map(name => TEMPLATES[name] && (
                                        <div key={name} draggable className="bg-white rounded shadow-sm border p-3 cursor-move mb-1 bg-blue-50 border-blue-200 hover:bg-blue-100 hover:border-blue-400 hover:shadow-md transition-all" onDragStart={e => handleTemplateDrag(e, name)}>
                                            <div className="text-sm font-semibold text-gray-800">{name}</div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Flow Control</h4>
                                    {['Apollo Split'].map(name => TEMPLATES[name] && (
                                        <div key={name} draggable className="bg-white rounded shadow-sm border p-3 cursor-move mb-1 bg-blue-50 border-blue-200 hover:bg-blue-100 hover:border-blue-400 hover:shadow-md transition-all" onDragStart={e => handleTemplateDrag(e, name)}>
                                            <div className="text-sm font-semibold text-gray-800">{name}</div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Condition</h4>
                                    {['Apollo Split', 'Time Conditions', 'Group Conditions'].map(name => TEMPLATES[name] && (
                                        <div key={name} draggable className="bg-white rounded shadow-sm border p-3 cursor-move mb-1 bg-blue-50 border-blue-200 hover:bg-blue-100 hover:border-blue-400 hover:shadow-md transition-all" onDragStart={e => handleTemplateDrag(e, name)}>
                                            <div className="text-sm font-semibold text-gray-800">{name}</div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Rewards</h4>
                                    {['DiDi Coupon', 'Request with Coupon'].map(name => TEMPLATES[name] && (
                                        <div key={name} draggable className="bg-white rounded shadow-sm border p-3 cursor-move mb-1 bg-blue-50 border-blue-200 hover:bg-blue-100 hover:border-blue-400 hover:shadow-md transition-all" onDragStart={e => handleTemplateDrag(e, name)}>
                                            <div className="text-sm font-semibold text-gray-800">{name}</div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Communication</h4>
                                    {['Push text(APP)', 'Email', 'WhatsAPP Message', 'SMS', 'Empty Action'].map(name => TEMPLATES[name] && (
                                        <div key={name} draggable className="bg-white rounded shadow-sm border p-3 cursor-move mb-1 bg-blue-50 border-blue-200 hover:bg-blue-100 hover:border-blue-400 hover:shadow-md transition-all" onDragStart={e => handleTemplateDrag(e, name)}>
                                            <div className="text-sm font-semibold text-gray-800">{name}</div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Custom</h4>
                                    {TEMPLATES['Custom Node'] && (
                                        <div draggable className="bg-purple-600 rounded shadow-sm border p-3 cursor-move mb-1 border-purple-700 hover:bg-purple-700 transition-all" onDragStart={e => handleTemplateDrag(e, 'Custom Node')}>
                                            <div className="text-sm font-semibold text-white">Custom Node</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </aside>
                        <main className="flex-1 bg-gray-100 overflow-auto p-4" ref={mainRef} onDragOver={e => e.preventDefault()} onDrop={handleDrop}>
                            <div className={`relative ${dragState ? 'no-select' : ''}`} style={{width:GRID_COLS*CELL_SIZE, height:GRID_ROWS*CELL_SIZE}}>
                                {Array.from({length:GRID_ROWS}).map((_,gy) => Array.from({length:GRID_COLS}).map((_,gx) => {
                                    const isTG = gx===0 && gy===0;
                                    const occupied = nodes.some(n => !n.pinned && n.gridX===gx && n.gridY===gy);
                                    return <div key={`${gx}-${gy}`} className={`absolute ${isTG?'border-blue-500 bg-blue-50':occupied?'border-green-500 bg-green-50':'border-gray-300 bg-white'}`} style={{left:gx*CELL_SIZE, top:gy*CELL_SIZE, width:CELL_SIZE, height:CELL_SIZE, borderRadius:8, borderWidth:1, borderStyle:'solid'}}/>;
                                }))}
                                {[...pinned, ...grid.filter(n => n.isTargetGroup)].map(n => <div key={n.id} className="absolute bg-indigo-600 rounded shadow-md flex items-center justify-center px-3" style={{left:n.gridX*CELL_SIZE+25, top:n.gridY*CELL_SIZE+50, width:CELL_SIZE-50, height:60, zIndex:15}} onClick={() => setSelectedId(n.id)}><span className="text-white text-sm text-center leading-tight">{getNodeDisplayName(n)}</span></div>)}
                                {orderedGridNodes.map((n) => {
                                    const sel = selectedId === n.id;
                                    const isUnclickable = n.nodeName === 'Empty Action' || n.nodeName === 'Special bubble for issuing coupons after call';
                                    return <div key={n.id} className={`absolute bg-white rounded shadow-sm border ${sel?'ring-2 ring-blue-500':'border-gray-200'} ${isUnclickable?'opacity-70':'cursor-pointer'}`} style={{left:n.gridX*CELL_SIZE+20, top:n.gridY*CELL_SIZE+20, width:CELL_SIZE-40, height:CELL_SIZE-40, zIndex:sel?20:10}} onMouseDown={e => { e.stopPropagation(); handleNodeDown(e, n.id); }} onClick={() => !isUnclickable && !wasDragged && setSelectedId(n.id)}>
                                        <div className="h-full flex flex-col items-center justify-center p-2 relative group">
                                            <span className="text-sm font-medium text-center">{getNodeDisplayName(n)}</span>
                                            <div className="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button className="w-6 h-6 bg-blue-500 hover:bg-blue-600 text-white rounded flex items-center justify-center text-xs font-bold shadow-sm" onClick={e => copyNode(n.id, e)} title="Copy">+</button>
                                                <button className="w-6 h-6 bg-red-500 hover:bg-red-600 text-white rounded flex items-center justify-center text-base leading-none shadow-sm" onClick={e => {e.stopPropagation(); deleteNode(n.id);}}>×</button>
                                            </div>
                                        </div>
                                    </div>;
                                })}
                                
                            </div>
                        </main>
                    </div>
                    {selected && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={closeModal}>
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl mx-4 max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="px-6 py-4 border-b flex justify-between items-center shrink-0">
                                    <h3 className="text-lg font-semibold">{selected.nodeName}</h3>
                                    <button onClick={closeModal} className="text-2xl w-8 h-8 flex items-center justify-center hover:bg-gray-100 rounded">×</button>
                                </div>
                                <div className="px-6 py-4 overflow-auto" style={{maxHeight:'calc(90vh-130px)'}}>
                                    {selected.pinned && selected.nodeName === 'Event basic info' ? (
                                    <table className="w-full">
                                        <thead>
                                            <tr className="text-left text-sm font-semibold text-gray-800 border-b">
                                                <th className="pb-2 pr-4 w-40">Field</th>
                                                <th className="pb-2 pr-4 w-48">Example</th>
<th className="pb-2 pr-4 w-56">
                                                        <div className="flex items-center gap-1">
                                                            <span>Data Type</span>
                                                            <div className="relative group">
                                                                <span className="inline-flex items-center justify-center w-4 h-4 text-xs text-gray-400 border border-gray-400 rounded-full hover:text-gray-600 hover:border-gray-600 cursor-pointer" onClick={e => { e.stopPropagation(); setOpenTooltip(openTooltip === 'datatype-tip' ? null : 'datatype-tip'); }}>?</span>
                                                                <div className={`absolute left-0 top-6 z-10 w-64 p-3 bg-white border border-gray-200 rounded shadow-lg text-xs text-gray-600 ${openTooltip === 'datatype-tip' ? 'block' : 'hidden'}`}>
                                                                    See in <a href="https://cooper.didichuxing.com/docs2/document/2207466607855" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">https://cooper.didichuxing.com/docs2/document/2207466607855</a>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <select className="ml-1 bg-white border rounded px-1 py-0.5 text-xs font-normal text-black" onChange={e => { if(e.target.value) { batchUpdateDataType(selected.id, e.target.value); } }}><option value="">Apply to all</option><option value="excel_upload">Excel Upload</option>{TEMPLATES[selected.nodeName]?.useFollowTemplateKey ? <option value="follow_template_key">Follow Template Key</option> : <><option value="fixed_value">Fixed</option><option value="system_generated">System-Generated</option></>}</select>
                                                    </th>
                                                    <th className="pb-2">Value</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {selected.fields.map((f, i) => (
                                                    <tr key={i} className="border-b">
                                                        <td className="py-3 pr-4"><div className={`text-sm ${f.subname?'text-gray-400':'text-gray-800'}`}>{f.name}</div>{f.subname && <div className="text-sm text-gray-800">{f.subname}</div>}</td>
                                                        <td className="py-3 pr-4"><div className="text-xs text-gray-400">{f.example || '-'}</div></td>
                                                        <td className="py-3 pr-4"><select className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.dataType || ''} onChange={e => updateField(selected.id, i, {dataType:e.target.value})}><option value="">Select...</option><option value="excel_upload">Excel Upload</option>{TEMPLATES[selected.nodeName]?.useFollowTemplateKey ? <option value="follow_template_key">Follow Template Key</option> : <><option value="fixed_value">Fixed</option><option value="system_generated">System-Generated</option></>}</select></td>
                                                    <td className="py-3">{f.dataType === 'excel_upload' ? <div className="text-sm text-gray-400 italic">Upload from Excel</div> : <input type="text" className={`w-full border rounded px-2 py-1.5 text-sm ${f.dataType ? 'bg-gray-50' : 'bg-gray-200 cursor-not-allowed'}`} value={f.value||''} placeholder={f.dataType ? 'Enter value' : 'Select data type first'} disabled={!f.dataType} onChange={e => updateField(selected.id, i, {value:e.target.value})}/>}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    ) : selected.pinned ? (
                                    <table className="w-full">
                                        <thead><tr className="text-left text-sm font-semibold text-gray-800 border-b"><th className="pb-2 pr-4 w-40">Field</th><th className="pb-2 pr-4 w-48">Example</th><th className="pb-2">Value</th></tr></thead>
                                        <tbody>
                                            {selected.fields.map((f, i) => (
                                                <tr key={i} className="border-b">
                                                    <td className="py-3 pr-4">
                                                        <div className="flex items-center gap-1">
                                                            <div className={`text-sm ${f.subname?'text-gray-400':'text-gray-800'}`}>{f.name}</div>
                                                            {f.name === 'Canvas Automatic Approval' && (
                                                                <div className="relative group">
                                                                    <span className="inline-flex items-center justify-center w-4 h-4 text-xs text-gray-400 border border-gray-400 rounded-full hover:text-gray-600 hover:border-gray-600 cursor-pointer" onClick={e => { e.stopPropagation(); setOpenTooltip(openTooltip === 'canvas-approval-tip' ? null : 'canvas-approval-tip'); }}>?</span>
                                                                    <div className={`absolute left-0 top-6 z-10 w-64 p-3 bg-white border border-gray-200 rounded shadow-lg text-xs text-gray-600 ${openTooltip === 'canvas-approval-tip' ? 'block' : 'hidden'}`}>
                                                                        See in <a href="https://cooper.didichuxing.com/docs2/document/2207466607855" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">https://cooper.didichuxing.com/docs2/document/2207466607855</a>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                        {f.subname && <div className="text-sm text-gray-800">{f.subname}</div>}
                                                    </td>
                                                    <td className="py-3 pr-4"><div className="text-xs text-gray-400">{f.example || '-'}</div></td>
                                                    <td className="py-3">
                                                        {f.name === 'Canvas Automatic Approval' ? (
                                                            <select className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.value||''} onChange={e => updateField(selected.id, i, {value:e.target.value})}><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select>
                                                        ) : f.name === 'Priority' ? (
                                                            <select className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.value||''} onChange={e => updateField(selected.id, i, {value:e.target.value})}><option value="">Select...</option><option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option></select>
                                                        ) : (f.name === 'Benefits' || f.subname === 'Before' || f.subname === 'After') ? (
                                                            <textarea className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm h-20 resize-y" value={f.value||''} onChange={e => updateField(selected.id, i, {value:e.target.value})}/>
                                                        ) : (
                                                            <input type="text" className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.value||''} onChange={e => updateField(selected.id, i, {value:e.target.value})}/>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    ) : selected.isCustom ? (
                                    <div>
                                        <div className="mb-4">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Node Name:</label>
                                            <input type="text" className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={selected.nodeName||''} placeholder="Enter" onChange={e => setNodes(prev => prev.map(n => n.id === selected.id ? {...n, nodeName: e.target.value} : n))}/>
                                        </div>
                                        <table className="w-full">
                                            <thead>
                                                <tr className="text-left text-sm font-semibold text-gray-800 border-b">
                                                    <th className="pb-2 w-10"></th>
                                                    <th className="pb-2 pr-4 w-48">Field</th>
                                                    <th className="pb-2 pr-4 w-36">Prompt</th>
                                                    <th className="pb-2 pr-4 w-44">Data Type</th>
                                                    <th className="pb-2">Value</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {selected.fields.map((f, i) => (
                                                    <tr key={i} className="border-b">
                                                        <td className="py-3 pr-2"><button onClick={() => deleteCustomField(selected.id, i)} className="w-8 h-8 bg-red-500 hover:bg-red-600 text-white rounded flex items-center justify-center text-xs font-bold shadow-sm" title="Delete field">×</button></td>
                                                        <td className="py-3 pr-4"><input type="text" className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.name||''} placeholder="Enter field" onChange={e => updateField(selected.id, i, {name:e.target.value, subname:''})}/></td>
                                                        <td className="py-3 pr-4"><input type="text" className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.example||''} placeholder="Enter example" onChange={e => updateField(selected.id, i, {example:e.target.value})}/></td>
                                                        <td className="py-3 pr-4"><select className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.dataType || ''} onChange={e => updateField(selected.id, i, {dataType:e.target.value})}><option value="">Select...</option><option value="excel_upload">Excel Upload</option><option value="fixed_value">Fixed</option><option value="system_generated">System-Generated</option></select></td>
                                                        <td className="py-3">{f.dataType === 'excel_upload' ? <div className="text-sm text-gray-400 italic">Upload from Excel</div> : <input type="text" className={`w-full border rounded px-2 py-1.5 text-sm ${f.dataType ? 'bg-gray-50' : 'bg-gray-200 cursor-not-allowed'}`} value={f.value||''} placeholder={f.dataType ? 'Enter value' : 'Select data type first'} disabled={!f.dataType} onChange={e => updateField(selected.id, i, {value:e.target.value})}/>}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        <button onClick={() => addCustomField(selected.id)} className="mt-2 px-3 py-1.5 bg-purple-600 text-white rounded text-sm hover:bg-purple-700">+ Add Field</button>
                                    </div>
                                    ) : selected.fields.length > 0 ? (
                                    <>
                                        <table className="w-full">
                                            <thead>
                                                <tr className="text-left text-sm font-semibold text-gray-800 border-b">
                                                    <th className="pb-2 w-10"></th>
                                                    <th className="pb-2 pr-4 w-40">Field</th>
                                                    <th className="pb-2 pr-4 w-48">Example</th>
<th className="pb-2 pr-4 w-56">
                                                        <div className="flex items-center gap-1">
                                                            <span>Data Type</span>
                                                            <div className="relative group">
                                                                <span className="inline-flex items-center justify-center w-4 h-4 text-xs text-gray-400 border border-gray-400 rounded-full hover:text-gray-600 hover:border-gray-600 cursor-pointer" onClick={e => { e.stopPropagation(); setOpenTooltip(openTooltip === 'datatype-tip-2' ? null : 'datatype-tip-2'); }}>?</span>
                                                                <div className={`absolute left-0 top-6 z-10 w-64 p-3 bg-white border border-gray-200 rounded shadow-lg text-xs text-gray-600 ${openTooltip === 'datatype-tip-2' ? 'block' : 'hidden'}`}>
                                                                    See in <a href="https://cooper.didichuxing.com/docs2/document/2207466607855" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">https://cooper.didichuxing.com/docs2/document/2207466607855</a>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <select className="ml-1 bg-white border rounded px-1 py-0.5 text-xs font-normal text-black" onChange={e => { if(e.target.value) { batchUpdateDataType(selected.id, e.target.value); } }}><option value="">Apply to all</option><option value="excel_upload">Excel Upload</option>{TEMPLATES[selected.nodeName]?.useFollowTemplateKey ? <option value="follow_template_key">Follow Template Key</option> : <><option value="fixed_value">Fixed</option><option value="system_generated">System-Generated</option></>}</select>
                                                    </th>
                                                    <th className="pb-2">Value</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {selected.fields.map((f, i) => (
                                                    <tr key={i} className={`border-b ${f.deleted ? 'opacity-50' : ''}`}>
                                                        <td className="py-3 pr-2"><button onClick={() => toggleDeleteField(selected.id, i)} className={`w-8 h-8 rounded flex items-center justify-center text-xs font-bold shadow-sm ${f.deleted ? 'bg-green-500 hover:bg-green-600' : 'bg-white hover:bg-gray-100 border border-gray-400 text-gray-400'} text-white`} title={f.deleted ? 'Restore field' : 'Mark field as No Need'}>{f.deleted ? '↩' : '×'}</button></td>
                                                        <td className="py-3 pr-4"><div className={`text-sm ${f.subname?'text-gray-400':'text-gray-800'} ${f.deleted ? 'line-through' : ''}`}>{f.name}</div>{f.subname && <div className={`text-sm text-gray-800 ${f.deleted ? 'line-through' : ''}`}>{f.subname}</div>}</td>
                                                        <td className="py-3 pr-4"><div className="text-xs text-gray-400">{f.example || '-'}</div></td>
                                                        {f.isMaxCoupon || f.isMaxQuickReply || f.isMaxCallToAction ? (
                                                            <td colSpan={2} className="py-3">{f.deleted ? <div className="text-sm text-gray-400 italic">No Need</div> : <input type="text" className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.value||''} placeholder="Enter value" onChange={e => updateField(selected.id, i, {value:e.target.value})}/>}</td>
                                                        ) : (
                                                            <>
                                                                <td className="py-3 pr-4">{f.deleted ? <div className="text-sm text-gray-400 italic">No Need</div> : <select className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm" value={f.dataType || ''} onChange={e => updateField(selected.id, i, {dataType:e.target.value})}><option value="">Select...</option><option value="excel_upload">Excel Upload</option>{TEMPLATES[selected.nodeName]?.useFollowTemplateKey ? <option value="follow_template_key">Follow Template Key</option> : <><option value="fixed_value">Fixed</option><option value="system_generated">System-Generated</option></>}</select>}</td>
                                                                <td className="py-3">{f.deleted ? <div className="text-sm text-gray-400 italic">No Need</div> : f.dataType === 'excel_upload' ? <div className="text-sm text-gray-400 italic">Upload from Excel</div> : f.dataType === 'follow_template_key' ? <div className="text-sm text-gray-400 italic">Follow Template Key</div> : <input type="text" className={`w-full border rounded px-2 py-1.5 text-sm ${f.dataType ? 'bg-gray-50' : 'bg-gray-200 cursor-not-allowed'}`} value={f.value||''} placeholder={f.dataType === 'fixed_value' || f.dataType === 'system_generated' ? 'Enter value' : 'Select data type first'} disabled={!f.dataType} onChange={e => updateField(selected.id, i, {value:e.target.value})}/>}</td>
                                                            </>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </>
                                    ) : (
                                    <div className="text-sm text-gray-500 py-4">No configurable fields for this node.</div>
                                    )}
                                    <div className="mt-4 pt-4 border-t">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Notes:</label>
                                        <textarea className="w-full bg-gray-50 border rounded px-2 py-1.5 text-sm h-20 resize-y" placeholder="Enter notes..." value={selected.notes||''} onChange={e => setNodes(prev => prev.map(n => n.id === selected.id ? {...n, notes: e.target.value} : n))}/>
                                    </div>
                                </div>
                                <div className="px-6 py-4 border-t flex justify-end gap-3 shrink-0">
                                    <button onClick={closeModal} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                                    <button onClick={handleSave} className="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
                                </div>
                            </div>
                        </div>
)}

                    {showIncompleteWarning && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60]" onClick={() => setShowIncompleteWarning(false)}>
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4" onClick={e => e.stopPropagation()}>
                                <div className="p-6">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                                            <span className="text-xl">⚠️</span>
                                        </div>
                                        <h3 className="text-lg font-semibold text-gray-800">Warning</h3>
                                    </div>
                                    <p className="text-gray-600 mb-4">Please complete all required fields.</p>
                                    <div className="flex justify-end">
                                        <button onClick={closeModal} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
