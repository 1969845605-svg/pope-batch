<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Push Optimization Workbench</title>
    <script>window.ENV = window.ENV || {};</script>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #d9e0ea;
        --text: #15202b;
        --muted: #6b7785;
        --accent: #1f6feb;
        --accent-light: #eef5ff;
        --success: #2da44e;
        --success-light: #f0fff4;
        --warning: #d4a72c;
        --radius: 8px;
        --left-width: 320px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        display: grid;
        grid-template-columns: var(--left-width) 1fr 260px;
        min-height: 100vh;
      }

      .panel-resizer {
        width: 4px;
        cursor: col-resize;
        background: var(--line);
        transition: background 0.15s;
        display: none;
      }

      .panel-resizer:hover,
      .panel-resizer.dragging {
        background: var(--accent);
      }

      .panel-resizer::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 2px;
        height: 30px;
        background: var(--muted);
        border-radius: 2px;
        opacity: 0.5;
      }

      .panel-resizer:hover::after,
      .panel-resizer.dragging::after {
        background: var(--accent);
        opacity: 1;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        overflow-y: auto;
        max-height: 100vh;
      }

      .panel-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-weight: 600;
        font-size: 12px;
        color: var(--muted);
        position: sticky;
        top: 0;
        background: var(--panel);
        z-index: 1;
      }

      .panel-body { padding: 14px; }

      .field { margin-bottom: 12px; }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--text);
        margin-bottom: 6px;
        font-weight: 600;
      }

      textarea, input, select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        background: #fff;
      }

      textarea { resize: none; min-height: 40px; overflow-y: auto; }
      #base-prompt { min-height: 280px; }
      #strategy { min-height: 80px; }
      input[type="number"] { width: 70px; }

      /* Dynamic Parameters */
      .param-section {
        margin-top: 8px;
        padding: 10px;
        background: var(--bg);
        border-radius: 6px;
        border: 1px solid var(--line);
      }

      .param-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .param-section-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }

      .param-count {
        font-size: 10px;
        padding: 2px 6px;
        background: var(--accent);
        color: #fff;
        border-radius: 4px;
      }

      .param-item {
        margin-bottom: 8px;
      }

      .param-item:last-child { margin-bottom: 0; }

      .param-item label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 4px;
        color: var(--text);
      }

      .param-item label .param-name {
        background: var(--accent-light);
        color: var(--accent);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-size: 10px;
      }

      .param-item input {
        width: 100%;
        padding: 6px 8px;
        font-size: 11px;
        border: 1px solid var(--line);
        border-radius: 4px;
      }

      /* Tree View */
      .tree-view {
        margin-top: 12px;
      }

      .tree-level-1 {
        margin-bottom: 12px;
      }

      .tree-prompt-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }

      .tree-prompt-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        cursor: pointer;
      }

      .tree-prompt-header:hover { background: var(--line); }

      .tree-connector {
        width: 12px;
        height: 12px;
        border-left: 2px solid var(--line);
        border-bottom: 2px solid var(--line);
        display: inline-block;
        transform: rotate(-45deg);
        transition: transform 0.2s;
      }

      .tree-prompt-card.open .tree-connector { transform: rotate(45deg); }

      .tree-strategy-name {
        font-weight: 600;
        font-size: 12px;
      }

      .tree-strategy-badge {
        font-size: 10px;
        padding: 2px 6px;
        background: var(--success);
        color: #fff;
        border-radius: 4px;
        margin-left: auto;
      }

      .tree-push-list {
        display: none;
        padding: 8px;
        gap: 6px;
      }

      .tree-prompt-card.open .tree-push-list { display: flex; flex-direction: column; }

      .tree-push-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        background: var(--bg);
        border-radius: 6px;
        border: 1px solid transparent;
        font-size: 11px;
      }

      .tree-push-item:hover { border-color: var(--accent); }
      .tree-push-item.best {
        background: var(--success-light);
        border-color: var(--success);
      }

      .tree-push-rank {
        font-weight: 700;
        color: var(--muted);
        min-width: 20px;
      }

      .tree-push-item.best .tree-push-rank { color: var(--success); }

      .tree-push-content { flex: 1; min-width: 0; }

      .tree-push-text {
        line-height: 1.4;
        word-break: break-word;
      }

      .tree-push-metrics {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        font-size: 10px;
        color: var(--muted);
      }

      .tree-push-score {
        font-weight: 700;
        font-size: 14px;
        color: var(--success);
        white-space: nowrap;
        text-align: right;
        min-width: 40px;
      }

      .tree-push-item.best .tree-push-score { font-size: 16px; }

      .tree-score-bar {
        width: 100%;
        height: 3px;
        background: var(--line);
        border-radius: 2px;
        margin-top: 4px;
        overflow: hidden;
      }

      .tree-score-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s;
      }

      .tree-push-item.best .tree-score-fill { background: var(--success); }

      .section-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin: 14px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

.section-title:first-child { margin-top: 0; }

      .weights-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 8px;
      }

      .weight-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      .weight-row .weight-item {
        flex: 1;
        min-width: 0;
      }

      .weight-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        font-size: 11px;
        background: var(--bg);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
      }

      .weight-item-name {
        font-weight: 500;
        font-size: 11px;
        flex-shrink: 0;
      }

      .weight-item-value {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .weight-item-value input {
        width: 50px;
        padding: 3px 5px;
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 4px;
        font-size: 10px;
        background: #fff;
        flex-shrink: 0;
      }

      .weight-sum {
        display: flex;
        justify-content: flex-end;
        font-size: 11px;
      }

      .weight-sum.ok { color: var(--success); }

      .status {
        margin-top: 10px;
        padding: 8px;
        background: var(--bg);
        border-radius: 6px;
        font-size: 11px;
        color: var(--muted);
      }

      /* Main Panel */
      .main-panel { border-left: none; border-right: none; }

      .round-card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 12px;
        background: #fff;
        overflow: hidden;
      }

      .round-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
      }

      .round-number {
        font-weight: 600;
        font-size: 12px;
      }

      .round-badge {
        font-size: 10px;
        padding: 2px 6px;
        background: var(--accent);
        color: #fff;
        border-radius: 4px;
      }

      .round-body { padding: 12px; }

      .round-expand-btn {
        width: 100%;
        padding: 6px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
      }
      .round-expand-btn:hover { background: var(--line); }

      .btn {
        padding: 10px 16px;
        border: none;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        margin-bottom: 10px;
      }

      .btn-primary { background: var(--accent); color: #fff; }
      .btn:hover { opacity: 0.85; }

      .round-content { display: none; }
      .round-content.open { display: block; }

      .expand-section {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .expand-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        padding: 6px 0;
      }

      .expand-section-header:hover { color: var(--accent); }

      .expand-section-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }

      .expand-section-content { display: none; margin-top: 8px; }
      .expand-section-content.open { display: block; }

      .topk-badge {
        font-size: 9px;
        padding: 1px 4px;
        background: var(--success);
        color: #fff;
        border-radius: 3px;
        margin-left: 4px;
      }

      /* Prompt Card (compact) */
      .prompt-mini-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .prompt-mini-card:hover { border-color: var(--accent); }
      .prompt-mini-card.topk {
        border-color: var(--success);
        background: var(--success-light);
      }

      .prompt-mini-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .prompt-id { font-weight: 600; font-size: 11px; }
      .prompt-score { font-size: 14px; font-weight: 700; color: var(--success); }

      .prompt-preview {
        font-size: 11px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Push Group */
      .push-group {
        margin-bottom: 10px;
      }

      .push-group-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 4px;
      }

      /* Score Table */
      .score-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }

      .score-table th {
        text-align: left;
        padding: 6px 8px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        font-weight: 600;
        color: var(--muted);
      }

      .score-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--line);
      }

      .score-table tr:hover td { background: var(--accent-light); }

      /* Right Panel - Metrics */
      .metric-card {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fff;
      }

      .metric-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .metric-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--success);
      }

      .metric-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

      .best-push-preview {
        font-size: 12px;
        line-height: 1.5;
        padding: 8px;
        background: var(--success-light);
        border-radius: 4px;
        margin-top: 6px;
      }

      /* History List */
      .history-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        margin-bottom: 6px;
        cursor: pointer;
        background: #fff;
        width: 100%;
        text-align: left;
        font: inherit;
      }
      .history-item:hover { border-color: var(--accent); }
      .history-item.active { border-color: var(--accent); background: var(--accent-light); }
      .history-item.best { border-color: var(--success); background: var(--success-light); }

      .history-round { font-weight: 600; font-size: 11px; }
      .history-score { font-weight: 700; color: var(--success); font-size: 12px; }
      .history-time { font-size: 10px; color: var(--muted); margin-top: 2px; }

      .history-section { margin-bottom: 12px; }

      .data-section { padding-top: 4px; }

      /* Mini Chart */
      .mini-chart {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 50px;
        padding: 4px 0;
      }

      .chart-bar {
        flex: 1;
        background: var(--accent);
        border-radius: 2px;
        min-height: 4px;
        transition: height 0.3s;
      }

      .chart-bar.best { background: var(--success); }

      /* API Console */
      .api-console {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--panel);
        border-top: 1px solid var(--line);
        z-index: 100;
      }

      .api-toggle {
        width: 100%;
        padding: 8px 14px;
        background: var(--panel);
        border: none;
        border-top: 1px solid var(--line);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--muted);
      }

      .api-content {
        display: none;
        max-height: 200px;
        overflow-y: auto;
        padding: 10px 14px;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        line-height: 1.8;
      }

      .api-content.open { display: block; }

      .log-entry { color: var(--muted); }
      .log-entry.success { color: var(--success); }
      .log-entry.error { color: #c41; }
      .log-entry .time { color: var(--muted); opacity: 0.6; }

      /* Hover Tooltip */
      .tooltip {
        position: fixed;
        max-width: 300px;
        padding: 10px 12px;
        background: var(--text);
        color: #fff;
        border-radius: 6px;
        font-size: 11px;
        line-height: 1.5;
        z-index: 1000;
        pointer-events: none;
        display: none;
        white-space: pre-wrap;
      }

      .tooltip.show { display: block; }

      /* Push Detail Modal */
      .push-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
      }

      .push-modal.open {
        display: flex;
      }

      .push-modal-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
      }

      .push-modal-content {
        position: relative;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }

      .modal-push-text {
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 16px;
        padding: 12px;
        background: var(--bg);
        border-radius: 8px;
      }

      .modal-push-score {
        font-size: 18px;
        font-weight: 700;
        color: var(--success);
        margin-bottom: 16px;
      }

      .modal-push-metrics {
        display: grid;
        gap: 8px;
      }

      .modal-metric {
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        background: var(--bg);
        border-radius: 6px;
        font-size: 12px;
      }

      .modal-metric span:first-child {
        color: var(--muted);
      }

      .modal-metric span:last-child {
        font-weight: 600;
      }

      /* Empty State */
      .empty {
        padding: 20px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        font-size: 11px;
      }

      /* Timeline View */
      .timeline-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .timeline-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        margin-bottom: 4px;
      }

      .timeline-round-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        font-size: 12px;
      }

      .timeline-round-label.current {
        color: var(--accent);
      }

      .timeline-round-label .score {
        font-weight: 700;
        color: var(--success);
      }

      .timeline-arrow {
        color: var(--muted);
        font-size: 16px;
      }

      .timeline-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .timeline-round-column {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 130px;
        min-width: 130px;
      }

      .timeline-connector {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        min-width: 50px;
        color: var(--muted);
        font-size: 11px;
      }

      .prompt-card-timeline {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        background: #fff;
        cursor: pointer;
        transition: all 0.15s;
      }

      .prompt-card-timeline:hover {
        border-color: var(--accent);
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }

      .prompt-card-timeline.topk {
        border-color: var(--success);
        background: var(--success-light);
      }

      .prompt-card-timeline-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .prompt-card-timeline-name {
        font-weight: 600;
        font-size: 11px;
      }

      .prompt-card-timeline-score {
        font-weight: 700;
        font-size: 13px;
        color: var(--success);
      }

      .prompt-card-timeline-preview {
        font-size: 10px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .timeline-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        padding: 10px;
        background: var(--success-light);
        border: 1px solid var(--success);
        border-radius: 6px;
        font-size: 12px;
      }

      .timeline-summary-icon {
        font-size: 16px;
      }

      .timeline-summary-text {
        flex: 1;
      }

      .timeline-summary-score {
        font-weight: 700;
        color: var(--success);
        font-size: 16px;
      }

      /* Prompt Tree View */
      .round-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .round-section {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .round-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
      }

      .round-title {
        font-weight: 600;
        font-size: 13px;
      }

      .round-best {
        font-weight: 700;
        color: var(--success);
        font-size: 13px;
      }

      .prompt-tree {
        border-bottom: 1px solid var(--line);
      }

      .prompt-tree:last-child {
        border-bottom: none;
      }

      .prompt-tree.best {
        background: var(--success-light);
      }

      .prompt-tree-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .prompt-tree-header:hover {
        background: var(--bg);
      }

      .prompt-tree-toggle {
        font-size: 10px;
        color: var(--muted);
        width: 16px;
      }

      .prompt-tree-name {
        font-weight: 600;
        font-size: 12px;
      }

      .prompt-tree-score {
        font-weight: 700;
        color: var(--success);
      }

      .prompt-tree-header .optimize-btn {
        padding: 4px 10px;
        font-size: 11px;
        margin-left: auto;
      }

      .prompt-tree-header .optimize-btn:first-of-type {
        margin-right: 4px;
      }

      .prompt-tree-star {
        font-size: 12px;
      }

      .prompt-tree-top {
        font-size: 9px;
        padding: 2px 6px;
        background: var(--success);
        color: #fff;
        border-radius: 4px;
        margin-left: 4px;
      }

      .prompt-tree-content {
        padding: 0 14px 12px 38px;
      }

      .push-item {

    </style>

  <body>
    <div class="app">

    <!-- Push Detail Modal -->
    <div class="push-modal" id="push-modal">
      <div class="push-modal-overlay" onclick="hidePushDetail()"></div>
      <div class="push-modal-content" id="push-modal-content">
      </div>

    <script>
      const STORAGE_KEY = "ai_push_evolution_v2";
      const HISTORY_STORAGE_KEY = "ai_push_evolution_history_v1";

      const state = {
        basePrompt: "",
        strategy: "",
        params: {},
        promptCount: 3,
        pushCount: 3,
        topK: 1,
        weights: [
          { name: "Clarity", value: 0.25 },
          { name: "Tone", value: 0.25 },
          { name: "CTR", value: 0.25 },
          { name: "Compliance", value: 0.25 }
        ],
        runtime: {
          apiKey: window.ENV?.api || "",
          model: "MiniMax-M2.5-highspeed",
          endpoint: "https://api.minimaxi.com/v1/text/chatcompletion_v2"
        },
        rounds: [],
        globalBest: null,
        currentRound: 0,
        viewingRoundNum: null,
        logs: [],
        history: [],
        activeHistoryId: null,
        latestSnapshot: null,
        isViewingHistory: false,
        viewingSnapshotId: null
      };

      const $ = id => document.getElementById(id);

      function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

      function safeString(str) {
        return JSON.stringify(str).slice(1, -1);
      }

      function generateId() { return Math.random().toString(36).slice(2, 8); }

      function log(msg, type = "") {
        const time = new Date().toLocaleTimeString();
        state.logs.push({ time, msg, type });
        renderLogs();
      }

      function renderLogs() {
        const el = $("log-entries");
        if (!el) return;
        el.innerHTML = state.logs.map(l => `
          <div class="log-entry ${l.type}"><span class="time">[${l.time}]</span> ${l.msg}</div>
        `).join("");
        el.scrollTop = el.scrollHeight;
      }

      function saveState() {
        const toSave = {
          rounds: state.rounds,
          basePrompt: state.basePrompt,
          strategy: state.strategy,
          params: state.params,
          currentRound: state.currentRound,
          globalBest: state.globalBest,
          viewingRoundNum: state.viewingRoundNum
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const saved = JSON.parse(raw);
            state.rounds = saved.rounds || [];
            state.basePrompt = saved.basePrompt || '';
            state.strategy = saved.strategy || '';
            state.params = saved.params || {};
            state.currentRound = saved.currentRound || 0;
            state.globalBest = saved.globalBest || null;
            state.viewingRoundNum = saved.viewingRoundNum || null;

            if (state.rounds.length > 0) {
              state.latestSnapshot = {
                id: `loop-${Date.now()}`,
                createdAt: new Date().toISOString(),
                source: 'loaded',
                input: {
                  basePrompt: state.basePrompt,
                  strategy: state.strategy,
                  params: deepClone(state.params)
                },
                runtime: {
                  model: state.runtime.model,
                  endpoint: state.runtime.endpoint
                },
                rounds: deepClone(state.rounds),
                globalBest: deepClone(state.globalBest),
                currentRound: state.currentRound
              };
            }

            $("base-prompt").value = state.basePrompt;
            $("strategy").value = state.strategy;
            autoResizeTextarea($("base-prompt"));
            autoResizeTextarea($("strategy"));
            renderParamFields();
          }
        } catch {
          state.rounds = [];
        }
      }

      function createSnapshot(source = "manual") {
        return {
          id: `loop-${Date.now()}`,
          createdAt: new Date().toISOString(),
          source,
          input: {
            basePrompt: state.basePrompt,
            strategy: state.strategy,
            params: deepClone(state.params)
          },
          runtime: {
            model: state.runtime.model,
            endpoint: state.runtime.endpoint
          },
          rounds: deepClone(state.rounds),
          globalBest: deepClone(state.globalBest),
          currentRound: state.currentRound
        };
      }

      function saveHistoryToStorage() {
        try {
          localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(state.history));
        } catch (e) {
          log(`[Error] Failed to save history: ${e.message}`, "error");
        }
      }

      function loadHistoryFromStorage() {
        try {
          const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
          state.history = raw ? JSON.parse(raw) : [];
        } catch (_error) {
          state.history = [];
        }
      }

      function saveCurrentLoop() {
        if (!state.latestSnapshot && state.rounds.length === 0) {
          log("[System] No loop to save", "");
          return;
        }

        const snapshot = createSnapshot("manual");
        if (!state.latestSnapshot && state.rounds.length > 0) {
          snapshot.rounds = deepClone(state.rounds);
          snapshot.globalBest = deepClone(state.globalBest);
          snapshot.currentRound = state.currentRound;
        }

        state.history = [snapshot, ...state.history].slice(0, 30);
        state.activeHistoryId = snapshot.id;
        saveHistoryToStorage();
        renderHistory();
        log("[System] Loop saved", "success");
      }

      function clearHistory() {
        state.history = [];
        state.activeHistoryId = null;
        saveHistoryToStorage();
        renderHistory();
        log("[System] History cleared", "");
      }

      function exportToExcel() {
        if (!state.rounds.length) {
          log("[System] No rounds to export", "error");
          return;
        }

        const rows = [["Round", "Prompt #", "Prompt Text", "Push #", "Title", "Body", "Score", "Clarity", "Tone", "CTR", "Compliance"]];

        let lastRoundNum = null;
        let lastPromptIdx = null;

        state.rounds.forEach(round => {
          round.prompts.forEach((prompt, pi) => {
            prompt.pushes.forEach((push, pushi) => {
              const roundCell = round.roundNum === lastRoundNum ? '' : round.roundNum;
              const promptCell = (round.roundNum === lastRoundNum && pi === lastPromptIdx) ? '' : (pi + 1);
              lastRoundNum = round.roundNum;
              lastPromptIdx = pi;

              rows.push([
                roundCell,
                promptCell,
                (prompt.text || '').replace(/\n/g, ' '),
                pushi + 1,
                push.title || '',
                (push.body || push.text || '').replace(/\n/g, ' '),
                push.score || 0,
                push.metrics?.Clarity || 0,
                push.metrics?.Tone || 0,
                push.metrics?.CTR || 0,
                push.metrics?.Compliance || 0
              ]);
            });
          });
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Push Data");
        XLSX.writeFile(wb, `ai-push-export-${Date.now()}.xlsx`);
        log("[System] Exported to Excel", "success");
      }

      function importFromExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            if (rows.length < 2) {
              log("[System] Invalid file format", "error");
              return;
            }

            const header = rows[0].map(h => String(h).trim());
            const roundsMap = {};
            let currentRoundNum = null;
            let currentPromptIdx = null;

            for (let i = 1; i < rows.length; i++) {
              const values = rows[i];
              const row = {};
              header.forEach((h, idx) => row[h] = values[idx] || '');

              if (row['Round'] !== undefined && row['Round'] !== '') {
                currentRoundNum = parseInt(row['Round']) || 0;
              }
              if (row['Prompt #'] !== undefined && row['Prompt #'] !== '') {
                currentPromptIdx = parseInt(row['Prompt #']) - 1 || 0;
              }

              if (currentRoundNum === null || currentPromptIdx === null) continue;

              if (!roundsMap[currentRoundNum]) {
                roundsMap[currentRoundNum] = { roundNum: currentRoundNum, prompts: [] };
              }

              while (roundsMap[currentRoundNum].prompts.length <= currentPromptIdx) {
                roundsMap[currentRoundNum].prompts.push({
                  id: `prompt-${generateId()}`,
                  text: '',
                  pushes: []
                });
              }

              const prompt = roundsMap[currentRoundNum].prompts[currentPromptIdx];
              if (prompt.text === '' && row['Prompt Text']) {
                prompt.text = row['Prompt Text'] || '';
              }

              const push = {
                id: `push-${generateId()}`,
                title: row['Title'] || '',
                body: row['Body'] || '',
                text: row['Body'] || '',
                score: parseFloat(row['Score']) || 0,
                metrics: {
                  Clarity: parseInt(row['Clarity']) || 0,
                  Tone: parseInt(row['Tone']) || 0,
                  CTR: parseInt(row['CTR']) || 0,
                  Compliance: parseInt(row['Compliance']) || 0
                }
              };
              prompt.pushes.push(push);
            }

            const importedRounds = Object.values(roundsMap).sort((a, b) => a.roundNum - b.roundNum);
            importedRounds.forEach(round => {
              round.prompts.forEach(prompt => {
                prompt.pushes.sort((a, b) => b.score - a.score);
                prompt.bestPush = prompt.pushes[0];
                prompt.score = prompt.bestPush?.score || 0;
              });
              round.prompts.sort((a, b) => b.score - a.score);
              round.topKPrompts = round.prompts;
              round.bestPrompt = round.prompts[0];
              round.bestPush = round.bestPrompt?.bestPush || null;
            });

            state.rounds = importedRounds;
            state.currentRound = importedRounds.length;
            state.globalBest = importedRounds[importedRounds.length - 1]?.bestPush || null;
            state.activeHistoryId = null;
            state.viewingRoundNum = null;

            renderEvolutionBoard();
            renderHistory();
            updateMetrics();
            saveState();
            log(`[System] Imported ${importedRounds.length} rounds`, "success");
          } catch (err) {
            log(`[System] Import failed: ${err.message}`, "error");
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function applySnapshot(snapshot) {
        state.activeHistoryId = snapshot.id;
        state.basePrompt = snapshot.input.basePrompt || '';
        state.strategy = snapshot.input.strategy || '';
        state.params = deepClone(snapshot.input.params || {});
        state.runtime.model = snapshot.runtime.model || state.runtime.model;
        state.runtime.endpoint = snapshot.runtime.endpoint || state.runtime.endpoint;
        state.rounds = deepClone(snapshot.rounds || []);
        state.globalBest = deepClone(snapshot.globalBest);
        state.currentRound = snapshot.currentRound || 0;
        state.viewingRoundNum = null;

        $("base-prompt").value = state.basePrompt;
        $("strategy").value = state.strategy;
        $("model-select").value = state.runtime.model;
        $("api-endpoint").value = state.runtime.endpoint;
        autoResizeTextarea($("base-prompt"));
        autoResizeTextarea($("strategy"));
        renderParamFields();
        renderEvolutionBoard();
        renderHistory();
        updateMetrics();
        saveState();

        log(`[System] Restored loop from ${new Date(snapshot.createdAt).toLocaleString()}`, "");
      }

      async function callMiniMax(systemPrompt, userPrompt) {
        const apiKey = window.ENV?.api;
        if (!apiKey) {
          throw new Error("API Key is missing. Please check Vercel environment variable 'api' is configured correctly.");
        }
        const response = await fetch(state.runtime.endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: state.runtime.model,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ]
          })
        });
        const raw = await response.text();
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${raw}`);
        if (!raw.trim()) throw new Error("Empty API response");
        const data = JSON.parse(raw);
        return data.choices?.[0]?.message?.content || "";
      }

      function updateWeightSum() {
        const inputs = document.querySelectorAll(".weight-input");
        let sum = 0;
        inputs.forEach((input, i) => {
          state.weights[i].value = parseFloat(input.value) || 0;
          sum += state.weights[i].value;
        });
        const sumEl = $("weight-sum");
        if (Math.abs(sum - 1) < 0.001) {
          sumEl.innerHTML = `Sum: ${sum.toFixed(2)} ✓`;
          sumEl.className = "weight-sum ok";
        } else {
          sumEl.innerHTML = `Sum: ${sum.toFixed(2)} (should be 1.00)`;
          sumEl.className = "weight-sum";
          sumEl.style.color = "#c41";
        }
      }

      function extractParams(text) {
        const matches = text.match(/\{\{([^}]+)\}\}/g) || [];
        return [...new Set(matches.map(m => m.slice(2, -2)))];
      }

      function resolvePrompt(text, params) {
        let resolved = text;
        Object.entries(params).forEach(([key, value]) => {
          const escapedKey = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          resolved = resolved.replace(new RegExp(`\\{\\{${escapedKey}\\}\\}`, "g"), value || `{{${key}}}`);
        });
        return resolved;
      }

      function renderParamFields() {
        const params = extractParams(state.basePrompt);
        const section = $("param-section");
        const fieldsContainer = $("param-fields");
        const countBadge = $("param-count");

        if (params.length === 0) {
          section.style.display = "none";
          return;
        }

        section.style.display = "block";
        countBadge.textContent = params.length;

        params.forEach(p => {
          if (!state.params.hasOwnProperty(p)) {
            state.params[p] = "";
          }
        });

        Object.keys(state.params).forEach(key => {
          if (!params.includes(key)) {
            delete state.params[key];
          }
        });

        fieldsContainer.innerHTML = params.map(p => {
          const safeId = 'param-' + p.replace(/[^a-zA-Z0-9]/g, '_');
          const escapedP = p.replace(/'/g, "\\'");
          return `
          <div class="param-item">
            <label><span class="param-name">{{${p}}}</span></label>
            <input type="text" id="${safeId}" value="${(state.params[p] || "").replace(/"/g, "&quot;")}"
                   placeholder="Enter ${p}..." onchange="updateParam('${escapedP}', this.value)" />
          </div>
        `;
        }).join("");
      }

      function updateParam(key, value) {
        state.params[key] = value;
        renderParamFields();
      }

      // Generate Round Data
      function generateRound(roundNum, parentPrompts = []) {
        const resolvedPrompt = resolvePrompt(state.basePrompt, state.params);
        const prompts = [];

        // Generate prompts (parent prompts continue, otherwise create new ones)
        const promptCount = parentPrompts.length > 0 ? Math.min(parentPrompts.length, state.promptCount) : state.promptCount;

        for (let p = 0; p < promptCount; p++) {
          const parentPrompt = parentPrompts[p];
          const promptText = parentPrompt
            ? parentPrompt.text + " [Iteration]"
            : resolvedPrompt;

          const pushes = [];

          // Each prompt generates pushCount pushes
          for (let i = 0; i < state.pushCount; i++) {
            const clarity = Math.round(60 + Math.random() * 40);
            const tone = Math.round(60 + Math.random() * 40);
            const ctr = Math.round(60 + Math.random() * 40);
            const compliance = Math.round(60 + Math.random() * 40);
            const w0 = state.weights[0]?.value || 0.25;
            const w1 = state.weights[1]?.value || 0.25;
            const w2 = state.weights[2]?.value || 0.25;
            const w3 = state.weights[3]?.value || 0.25;
            const score = Math.round((clarity * w0 + tone * w1 + ctr * w2 + compliance * w3) * 10) / 10;
            const metrics = { "Clarity": clarity, "Tone": tone, "CTR": ctr, "Compliance": compliance };
            pushes.push({
              id: `push-${generateId()}`,
              text: `${promptText} (${i + 1})`,
              score,
              metrics
            });
          }

          // Sort pushes by score
          pushes.sort((a, b) => b.score - a.score);

          // Prompt score = best push score
          const promptScore = pushes[0].score;

          prompts.push({
            id: `prompt-${generateId()}`,
            text: promptText,
            score: promptScore,
            pushes: pushes,
            bestPush: pushes[0],
            parentId: parentPrompt ? parentPrompt.id : null
          });
        }

        // Sort prompts by score
        prompts.sort((a, b) => b.score - a.score);

        const topKPrompts = prompts.slice(0, state.topK);
        const bestPrompt = topKPrompts[0];
        const bestPush = bestPrompt ? bestPrompt.bestPush : null;

        return {
          roundNum,
          prompts,
          topKPrompts,
          bestPrompt,
          bestPush
        };
      }

      async function runNextRound() {
        if (!state.basePrompt.trim()) {
          alert("Please enter Base Prompt first");
          return;
        }

        state.currentRound++;
        log(`[Round ${state.currentRound}] Starting...`, "");

        const parentPrompts = state.rounds.length > 0
          ? state.rounds[state.rounds.length - 1].topKPrompts
          : [];

        try {
          const w0 = state.weights[0]?.value || 0.25;
          const w1 = state.weights[1]?.value || 0.25;
          const w2 = state.weights[2]?.value || 0.25;
          const w3 = state.weights[3]?.value || 0.25;

          log(`[Step 1] Generating 3 prompts × 3 pushes with scores...`, "");

const apiRequest = `[Pasted]Output JSON only, no additional explanations.

Structure:
{
  "variants": [
    {
      "prompt": "Full content of the first prompt",
      "pushes": [
        {
          "title": "Title 1",
          "body": "Body 1",
          "score": {
            "Clarity": 0,
            "Tone": 0,
            "CTR": 0,
            "Compliance": 0,
            "total": 0
          }
        },
        {
          "title": "Title 2",
          "body": "Body 2",
          "score": { ... }
        },
        {
          "title": "Title 3",
          "body": "Body 3",
          "score": { ... }
        }
      ]
    },
    {
      "prompt": "Full content of the second prompt",
      "pushes": [ ... ]
    },
    {
      "prompt": "Full content of the third prompt",
      "pushes": [ ... ]
    }
  ]
}

Base Prompt:
${safeString(state.basePrompt)}

Rewrite Rules:
${safeString(state.strategy || "none")}

Requirements:
1. Generate 3 different prompt variants based on Base Prompt with slight modifications
2. 【Important】Keep all original Base Prompt content, only add a few rules/instructions at the beginning, middle, or end
3. 【Forbidden】Do NOT delete, replace, or significantly modify the original Base Prompt content
4. 【Forbidden】Do NOT delete existing placeholders (such as {{userName}}, etc.), keep them as-is
5. Generate 3 pushes for each prompt
6. Score each push (each dimension 1-100, integer):
   - Clarity: Information clarity (is amount, action, expiration date clear at a glance)
   - Tone: Natural, humanized tone, not robotic or corporate-sounding
   - CTR: Click potential (benefits + call to action)
   - Compliance: Compliance (no sensitive words, no false claims, no violations)
7. Calculate all scores using the formula below and fill into each push's score object.`;

          const apiResponse = await callMiniMax(
            "You are an AI Push optimization assistant. Return ONLY valid JSON with no additional text.",
            apiRequest
          );

          let variants = [];
          try {
            let jsonStr = apiResponse;
            const match = apiResponse.match(/```(?:json)?\s*([\s\S]*?)```/);
            if (match && match[1]) {
              jsonStr = match[1];
            }
            const parsed = JSON.parse(jsonStr.trim());
            variants = parsed.variants || [];
          } catch (e) {
            log(`[Error] Failed to parse API response: ${e.message}`, "error");
            log(`[Raw Response] ${apiResponse.slice(0, 200)}...`, "error");
            return;
          }

          if (variants.length < 3) {
            log(`[Warning] Only ${variants.length} variants returned, expected 3`, "error");
          }

          log(`[Step 1] Generated ${variants.length} variants`, "success");

          const promptsWithPushes = variants.slice(0, 3).map((variant, pi) => {
            const w0 = state.weights[0]?.value || 0.25;
            const w1 = state.weights[1]?.value || 0.25;
            const w2 = state.weights[2]?.value || 0.25;
            const w3 = state.weights[3]?.value || 0.25;
            const pushes = (variant.pushes || []).slice(0, 3).map((p, i) => {
              const clarity = p.score?.Clarity || 0;
              const tone = p.score?.Tone || 0;
              const ctr = p.score?.CTR || 0;
              const compliance = p.score?.Compliance || 0;
              const total = Math.round((clarity * w0 + tone * w1 + ctr * w2 + compliance * w3) * 10) / 10;
              return {
                id: `push-${generateId()}`,
                text: `${p.title || ''} ${p.body || ''}`.trim(),
                title: p.title || '',
                body: p.body || '',
                score: total,
                metrics: { "Clarity": clarity, "Tone": tone, "CTR": ctr, "Compliance": compliance }
              };
            });

            pushes.sort((a, b) => b.score - a.score);

            log(`[Variant ${pi + 1}] Best push score: ${pushes[0]?.score || 'N/A'}`, "success");

            return {
              id: `prompt-${generateId()}`,
              text: variant.prompt || '',
              pushes: pushes,
              bestPush: pushes[0]
            };
          });

          promptsWithPushes.sort((a, b) => (b.bestPush?.score || 0) - (a.bestPush?.score || 0));

          // Sort prompts by their best push score
          promptsWithPushes.sort((a, b) => (b.bestPush?.score || 0) - (a.bestPush?.score || 0));

          const newRound = {
            roundNum: state.currentRound,
            prompts: promptsWithPushes,
            topKPrompts: promptsWithPushes,
            bestPrompt: promptsWithPushes[0],
            bestPush: promptsWithPushes[0]?.bestPush || null,
            pendingSelection: true
          };

          state.rounds.push(newRound);

          state.latestSnapshot = createSnapshot("live");

          // Show selection UI
          renderEvolutionBoard();
          $("status").textContent = `Round ${state.currentRound}: Please select the best Push`;

          log(`[System] Please select the best push from the 3 options above`, "");

        } catch (error) {
          log(`[Error] ${error.message}`, "error");
          $("status").textContent = `Error: ${error.message}`;
        }
      }

      function selectPush(promptIndex, pushId) {
        const round = state.rounds[state.rounds.length - 1];
        if (!round || !round.pendingSelection) return;
        if (!round.prompts || !round.prompts[promptIndex]) return;

        const selectedPush = round.prompts[promptIndex].pushes.find(p => p.id === pushId);
        const selectedPrompt = round.prompts[promptIndex];

        if (!selectedPush) return;

        round.pendingSelection = false;
        round.bestPrompt = selectedPrompt;

        state.globalBest = { ...selectedPush, round: state.currentRound };
        state.viewingRoundNum = null;

        const newParams = extractParams(selectedPrompt.text);
        const oldParams = { ...state.params };
        state.params = {};
        newParams.forEach(p => {
          state.params[p] = oldParams.hasOwnProperty(p) ? oldParams[p] : "";
        });

        $("base-prompt").value = selectedPrompt.text;
        state.basePrompt = selectedPrompt.text;
        autoResizeTextarea($("base-prompt"));
        renderParamFields();

        updateMetrics();
        renderEvolutionBoard();
        renderHistory();
        saveState();

        $("status").textContent = `Round ${state.currentRound} selected. Best: ${selectedPush.score}`;
        log(`[User Selected] Prompt "${selectedPrompt.text.slice(0, 30)}..." with best push score ${selectedPush.score}`, "success");
      }

      function resetAll() {
        state.rounds = [];
        state.currentRound = 0;
        state.globalBest = null;
        state.viewingRoundNum = null;
        state.logs = [];
        state.latestSnapshot = null;
        state.activeHistoryId = null;
        log("[System] Reset complete", "");
        renderEvolutionBoard();
        renderHistory();
        updateMetrics();
        saveState();
        $("status").textContent = "Reset. Click Run Next Round.";
      }

      function clearAll() {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(HISTORY_STORAGE_KEY);
        state.rounds = [];
        state.currentRound = 0;
        state.globalBest = null;
        state.viewingRoundNum = null;
        state.logs = [];
        state.latestSnapshot = null;
        state.activeHistoryId = null;
        state.history = [];
        state.isViewingHistory = false;
        state.viewingSnapshotId = null;
        state.basePrompt = '';
        state.strategy = '';
        state.params = {};
        state.weights = [
          { name: "Clarity", value: 0.25 },
          { name: "Tone", value: 0.25 },
          { name: "CTR", value: 0.25 },
          { name: "Compliance", value: 0.25 }
        ];

        $("base-prompt").value = '';
        $("strategy").value = '';
        autoResizeTextarea($("base-prompt"));
        autoResizeTextarea($("strategy"));
        renderParamFields();
        renderEvolutionBoard();
        renderHistory();
        updateMetrics();
        $("status").textContent = "Click Run Next Round.";
        log("[System] Cleared all data", "");
      }

      function updateMetrics() {
        $("round-count").textContent = state.rounds.length ? `(${state.rounds.length} rounds)` : "";
        renderHistory();
      }

      function renderHistory() {
        if (!state.rounds.length) {
          $("history-list").innerHTML = '';
          return;
        }

        $("history-list").innerHTML = state.rounds.map(round => {
          const isActive = state.viewingRoundNum === round.roundNum;
          return `
            <button class="history-item ${isActive ? 'active' : ''}" onclick="viewRound(${round.roundNum})">
              <span class="history-round">Round ${round.roundNum}</span>
              <span class="history-score">${round.bestPush?.score?.toFixed(2) || 'N/A'}</span>
            </button>
          `;
        }).join("");
      }

      function viewRound(roundNum) {
        state.viewingRoundNum = roundNum;
        state.isViewingHistory = true;
        renderHistory();
        renderEvolutionBoard();
        log(`[System] Viewing Round ${roundNum}`, "");
      }

      function exitHistoryView() {
        state.isViewingHistory = false;
        state.viewingRoundNum = null;
        renderHistory();
        renderEvolutionBoard();
        log("[System] Returned to current state", "");
      }

      function toggleRound(roundNum) {
        const card = document.querySelector(`[data-round="${roundNum}"]`);
        if (card) {
          const content = card.querySelector(".round-content");
          content.classList.toggle("open");
          card.classList.toggle("expanded");
        }
      }

      function toggleTreeCard(card) {
        card.classList.toggle("open");
      }

      function toggleSection(roundNum, section) {
        const card = document.querySelector(`[data-round="${roundNum}"]`);
        if (card) {
          const sec = card.querySelector(`[data-section="${section}"]`);
          if (sec) sec.classList.toggle("open");
        }
      }

      function renderEvolutionBoard() {
        if (!state.rounds.length) {
          $("evolution-board").innerHTML = '<div class="empty">No runs yet. Click "Run Next Round" on the left to start.</div>';
          return;
        }

        let roundsToShow;
        if (state.isViewingHistory && state.viewingRoundNum !== null) {
          const round = state.rounds.find(r => r.roundNum === state.viewingRoundNum);
          roundsToShow = round ? [round] : [state.rounds[state.rounds.length - 1]];
        } else if (state.isViewingHistory) {
          roundsToShow = state.rounds;
        } else {
          roundsToShow = [state.rounds[state.rounds.length - 1]];
        }

        let html = '<div class="round-list">';

        if (state.isViewingHistory) {
          html += `
            <div class="round-section" style="border: 2px solid var(--accent); margin-bottom: 16px;">
              <div class="round-section-header" style="background: var(--accent-light);">
                <span class="round-title" style="color: var(--accent);">Viewing History</span>
                <button class="optimize-btn" style="background: var(--accent); color: #fff; border-color: var(--accent);" onclick="exitHistoryView()">Back</button>
              </div>
            </div>
          `;
        }

        roundsToShow.forEach((displayRound, roundIndex) => {
          const isCurrentRound = displayRound.roundNum === state.rounds.length && !state.isViewingHistory;
          html += `<div class="round-section">`;
          html += `<div class="round-section-header">`;
          html += `<span class="round-title">Round ${displayRound.roundNum}${isCurrentRound ? ' (Current)' : ''}</span>`;
          html += `<span class="round-best">Best: ${displayRound.bestPush?.score?.toFixed(2) || 'N/A'}</span>`;
          if (state.isViewingHistory) {
            html += `<button class="optimize-btn" style="background:var(--success);color:#fff;border-color:var(--success);" onclick="restoreRoundFromHistory(${displayRound.roundNum})">Restore to this Round</button>`;
          }
          html += `</div>`;

        displayRound.prompts.forEach((prompt, pi) => {
          const isTop = displayRound.topKPrompts && displayRound.topKPrompts.some(p => p.id === prompt.id);
          const isBest = prompt.id === (displayRound.bestPrompt?.id || displayRound.bestPrompt?.bestPush?.id || null);
          const isExpanded = true;
          const bestPush = prompt.pushes?.[0];

          html += `
            <div class="prompt-tree ${isTop ? 'top' : ''} ${isBest ? 'best' : ''}">
              <div class="prompt-tree-header" onclick="togglePromptTree(this)">
                <span class="prompt-tree-toggle">${isExpanded ? '▼' : '▶'}</span>
                <span class="prompt-tree-name">Prompt #${pi + 1}</span>
                <span class="prompt-tree-score">${bestPush?.score?.toFixed(2) || 'N/A'}</span>
                <button class="optimize-btn" onclick="event.stopPropagation(); showPromptContent(${displayRound.roundNum}, ${pi})" style="margin-left:auto;margin-right:4px;">View Full</button>
                ${!state.isViewingHistory ? `<button class="optimize-btn" style="background:#d73a49;color:#fff;border-color:#d73a49;" onclick="event.stopPropagation(); selectPush(${pi}, '${bestPush?.id}')">Best</button>` : ''}
              </div>
              <div class="prompt-tree-content" style="display: ${isExpanded ? 'block' : 'none'}">
                ${bestPush ? `
                  <div class="push-item best">
                    <div class="push-item-header">
                      <span class="push-item-index">★</span>
                      <span class="push-item-label">Best Push</span>
                      <span class="push-item-score">${typeof bestPush.score === 'number' ? bestPush.score.toFixed(2) : 'N/A'}</span>
                    </div>
                    <div class="push-item-detail">
                      ${bestPush.title ? `<div class="push-item-title" style="font-weight:600;margin-bottom:4px;">${bestPush.title}</div>` : ''}
                      <div class="push-item-text">${bestPush.body || bestPush.text || ''}</div>
                      <div class="push-item-metrics">
                        ${Object.entries(bestPush.metrics || {}).map(([k, v]) => `<span>${k}: ${typeof v === 'number' ? v : v}</span>`).join('')}
                      </div>
                    </div>
                  </div>
                ` : ''}
                ${(prompt.pushes || []).slice(1).map((push, idx) => `
                  <div class="push-item" onclick="togglePushDetail(this)" style="cursor:pointer;">
                    <div class="push-item-header">
                      <span class="push-item-index">├</span>
                      <span class="push-item-label">Push ${idx + 2}</span>
                      <span class="push-item-score">${typeof push.score === 'number' ? push.score.toFixed(2) : 'N/A'}</span>
                    </div>
                    <div class="push-item-detail" style="display:none;">
                      ${push.title ? `<div class="push-item-title" style="font-weight:600;margin-bottom:4px;">${push.title}</div>` : ''}
                      <div class="push-item-text">${push.body || push.text || ''}</div>
                      <div class="push-item-metrics">
                        ${Object.entries(push.metrics || {}).map(([k, v]) => `<span>${k}: ${typeof v === 'number' ? v : v}</span>`).join('')}
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        });

        html += `</div>`;
        });

        html += '</div>';

        $("evolution-board").innerHTML = html;
      }

      function restoreRoundFromHistory(roundNum) {
        const round = state.rounds.find(r => r.roundNum === roundNum);
        if (!round || !round.bestPrompt) return;

        state.basePrompt = round.bestPrompt.text;
        state.viewingRoundNum = null;
        state.isViewingHistory = false;
        state.viewingSnapshotId = null;
        state.currentRound = roundNum;

        $("base-prompt").value = state.basePrompt;
        autoResizeTextarea($("base-prompt"));
        renderParamFields();
        renderEvolutionBoard();
        renderHistory();
        saveState();

        log(`[System] Restored to Round ${roundNum}: "${round.bestPrompt.text.slice(0, 40)}..."`, "");
        $("status").textContent = `Restored to Round ${roundNum}`;
      }

      function togglePromptTree(el) {
        const tree = el.parentElement;
        const content = tree.querySelector('.prompt-tree-content');
        const toggle = tree.querySelector('.prompt-tree-toggle');
        if (content.style.display === 'none') {
          content.style.display = 'block';
          toggle.textContent = '▼';
        } else {
          content.style.display = 'none';
          toggle.textContent = '▶';
        }
      }

      function togglePushDetail(el) {
        const detail = el.querySelector('.push-item-detail');
        if (detail.style.display === 'none') {
          detail.style.display = 'block';
        } else {
          detail.style.display = 'none';
        }
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      }

      function copyPushText(text) {
        const decoded = text.replace(/\\'/g, "'").replace(/&quot;/g, '"');
        navigator.clipboard.writeText(decoded).then(() => {
          log('[System] Copied to clipboard', 'success');
        }).catch(() => {
          log('[System] Copy failed', 'error');
        });
      }

      function showPushDetailModal(pushId, promptIndex) {
        const round = state.rounds[state.rounds.length - 1];
        if (!round || !round.prompts) return;
        const prompt = round.prompts[promptIndex];
        if (!prompt) return;
        const push = prompt.pushes.find(p => p.id === pushId);
        if (!push) return;
        const text = push.body || push.text || '';
        const title = push.title || '';
        showPushDetail(push.id, title, text, push.score, push.metrics);
      }

      function showPromptContent(roundNum, promptIndex) {
        const round = state.rounds.find(r => r.roundNum === roundNum);
        if (!round || !round.prompts) return;
        const prompt = round.prompts[promptIndex];
        if (!prompt) return;
        showPromptDetail(prompt.text || '', prompt.bestPush?.score);
      }

      function showPromptDetail(text, score) {
        const modal = $("push-modal");
        const content = $("push-modal-content");
        const escapedText = escapeHtml(text).replace(/\n/g, '<br>');
        content.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:#fff;padding:4px 0;">
            <span style="font-weight:600;">Prompt Detail</span>
            <span style="cursor:pointer;font-size:18px;color:var(--muted);" onclick="hidePushDetail()">×</span>
          </div>
          <div class="modal-push-text" style="white-space:pre-wrap;line-height:1.6;">${escapedText}</div>
          ${score !== undefined ? `<div class="modal-push-score">Score: ${typeof score === 'number' ? score.toFixed(2) : score}</div>` : ''}
        `;
        modal.classList.add("open");
      }

      function showPushDetail(id, title, text, score, metrics) {
        const modal = $("push-modal");
        const content = $("push-modal-content");
        const metricsHtml = Object.entries(metrics || {}).map(([k, v]) =>
          `<div class="modal-metric"><span>${k}</span><span>${typeof v === 'number' ? v : v}</span></div>`
        ).join("");
        content.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:#fff;padding:4px 0;">
            <span style="font-weight:600;">Push Detail</span>
            <span style="cursor:pointer;font-size:18px;color:var(--muted);" onclick="hidePushDetail()">×</span>
          </div>
          ${title ? `<div class="modal-push-title" style="font-weight:600;font-size:16px;margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px;">${title}</div>` : ''}
          <div class="modal-push-text">${text}</div>
          <div class="modal-push-score">Score: ${typeof score === 'number' ? score.toFixed(2) : score}</div>
          <div class="modal-push-metrics">${metricsHtml}</div>
        `;
        modal.classList.add("open");
      }

      function hidePushDetail() {
        $("push-modal").classList.remove("open");
      }

      function showTooltip(e, text) {
        const tip = $("tooltip");
        tip.textContent = text;
        tip.style.left = e.pageX + 10 + "px";
        tip.style.top = e.pageY + 10 + "px";
        tip.classList.add("show");
      }

      function hideTooltip() {
        $("tooltip").classList.remove("show");
      }

      // Event Listeners
      $("run-round-btn").addEventListener("click", runNextRound);
      $("reset-btn").addEventListener("click", resetAll);
      $("export-btn").addEventListener("click", exportToExcel);
      $("import-btn").addEventListener("click", () => $("import-file").click());
      $("import-file").addEventListener("change", e => {
        if (e.target.files[0]) {
          importFromExcel(e.target.files[0]);
          e.target.value = '';
        }
      });
      $("clear-all-btn").addEventListener("click", clearAll);

      function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      }

      $("base-prompt").addEventListener("input", e => {
        state.basePrompt = e.target.value;
        renderParamFields();
        autoResizeTextarea(e.target);
      });

      $("strategy").addEventListener("input", e => {
        state.strategy = e.target.value;
        autoResizeTextarea(e.target);
      });

      document.querySelectorAll(".weight-input").forEach(input => {
        input.addEventListener("input", updateWeightSum);
      });

      $("model-select").addEventListener("change", e => { state.runtime.model = e.target.value; });
      $("api-endpoint").addEventListener("input", e => { state.runtime.endpoint = e.target.value; });

      // Panel Resizer
      const LEFT_PANEL_STORAGE_KEY = "ai_push_left_panel_width";

      function getLeftPanelWidth() {
        const saved = localStorage.getItem(LEFT_PANEL_STORAGE_KEY);
        return saved ? parseInt(saved) : 280;
      }

      function setLeftPanelWidth(width) {
        const clamped = Math.min(450, Math.max(200, width));
        document.documentElement.style.setProperty("--left-width", clamped + "px");
        localStorage.setItem(LEFT_PANEL_STORAGE_KEY, String(clamped));
      }

      let isResizing = false;

      $("panel-resizer").addEventListener("mousedown", e => {
        isResizing = true;
        $("panel-resizer").classList.add("dragging");
        e.preventDefault();
      });

      document.addEventListener("mousemove", e => {
        if (!isResizing) return;
        const newWidth = e.clientX - 16;
        setLeftPanelWidth(newWidth);
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          $("panel-resizer").classList.remove("dragging");
        }
      });

      // Init
      setLeftPanelWidth(getLeftPanelWidth());
      loadState();
      loadHistoryFromStorage();
      state.basePrompt = $("base-prompt").value;
      state.strategy = $("strategy").value;
      renderParamFields();
      renderEvolutionBoard();
      renderHistory();
      updateMetrics();
      autoResizeTextarea($("base-prompt"));
      autoResizeTextarea($("strategy"));
      log("[System] Initialized", "");
    </script>
  </body>
</html>
